# ============================================================
# Worker Application 공통 설정
# ============================================================
server:
  port: 8084

spring:
  application:
    name: bootstrap-worker

  # ========================================
  # Config Import (Adapter Layer Settings)
  # ========================================
  config:
    import:
      - classpath:persistence.yml
      - optional:classpath:persistence-${spring.profiles.active:local}.yml
      - optional:classpath:persistence-legacy.yml
      - optional:classpath:persistence-legacy-${spring.profiles.active:local}.yml
      - classpath:nhn.yml
      - optional:classpath:nhn-${spring.profiles.active:local}.yml

# ========================================
# AWS SQS Listener
# ========================================
aws:
  sqs:
    listener:
      discount-outbox-queue-url: ${DISCOUNT_OUTBOX_QUEUE_URL:}
      discount-outbox-listener-enabled: true
      notification-outbox-queue-url: ${NOTIFICATION_OUTBOX_QUEUE_URL:}
      notification-outbox-listener-enabled: true

# ========================================
# Spring Cloud AWS
# ========================================
spring.cloud.aws:
  region:
    static: ap-northeast-2
  sqs:
    enabled: true

# ========================================
# Management & Actuator
# ========================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator

  endpoint:
    health:
      show-details: when-authorized
    prometheus:
      enabled: true

  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${spring.profiles.active:local}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99
    export:
      prometheus:
        enabled: true

# ========================================
# Observability
# ========================================
observability:
  http:
    enabled: true
    log-request-body: false
    log-response-body: false
    exclude-paths:
      - /actuator/**

# ========================================
# Sentry
# ========================================
sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${spring.profiles.active:local}
  release: ${APP_VERSION:unknown}
  traces-sample-rate: 1.0
  enable-tracing: true

# ========================================
# Logging
# ========================================
logging:
  level:
    root: INFO
    com.ryuqq.setof: DEBUG
    com.ryuqq.setof.adapter.in.sqs: DEBUG
