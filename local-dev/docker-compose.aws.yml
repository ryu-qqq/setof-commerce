# ===============================================
# SetOf Commerce - AWS 리소스 연결 로컬 개발 환경
# ===============================================
# 사전 조건: ./scripts/local-start.sh 실행 (Redis + Stage RDS 포트포워딩)
#
# 사용법:
#   # 특정 서비스만 실행
#   docker-compose -f docker-compose.aws.yml --profile web-api up -d
#   docker-compose -f docker-compose.aws.yml --profile api up -d
#   docker-compose -f docker-compose.aws.yml --profile legacy up -d
#   docker-compose -f docker-compose.aws.yml --profile batch up -d
#
#   # 전체 실행
#   docker-compose -f docker-compose.aws.yml --profile all up -d
#
#   # 종료
#   docker-compose -f docker-compose.aws.yml down
# ===============================================

name: setof-commerce-aws

# ===============================================
# 공통 설정
# ===============================================
x-common-env: &common-env
  # Database (Stage RDS via SSM Port Forwarding)
  DB_HOST: host.docker.internal
  DB_PORT: 13308
  DB_NAME: ${DB_NAME:-common}
  DB_USERNAME: ${DB_USERNAME:-admin}
  DB_PASSWORD: ${DB_PASSWORD}

  # Redis (로컬 Docker - local-start.sh로 실행)
  REDIS_HOST: host.docker.internal
  REDIS_PORT: 46379

  # AWS
  AWS_REGION: ${AWS_REGION:-ap-northeast-2}

  # Logging
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

x-common-settings: &common-settings
  extra_hosts:
    - "host.docker.internal:host-gateway"
  restart: unless-stopped

services:
  # ===============================================
  # Web API (신규)
  # ===============================================
  web-api:
    build:
      context: ..
      dockerfile: bootstrap/bootstrap-web-api/Dockerfile
    container_name: setof-web-api
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: stage
      SERVER_PORT: 8080
      # Kakao OAuth
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID:-}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:-}
      # JWT
      JWT_SECRET: ${JWT_SECRET:-}
      # FileFlow (dummy for local)
      FILEFLOW_BASE_URL: ${FILEFLOW_BASE_URL:-http://localhost:9999}
      FILEFLOW_BUCKET: ${FILEFLOW_BUCKET:-dummy-bucket}
      FILEFLOW_SERVICE_TOKEN: ${FILEFLOW_SERVICE_TOKEN:-dummy-token}
    ports:
      - "48080:8080"
    <<: *common-settings
    profiles:
      - web-api
      - api
      - all

  # ===============================================
  # Web API Admin (신규)
  # ===============================================
  web-api-admin:
    build:
      context: ..
      dockerfile: bootstrap/bootstrap-web-api-admin/Dockerfile
    container_name: setof-web-api-admin
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: stage
      SERVER_PORT: 8080
    ports:
      - "48081:8080"
    <<: *common-settings
    profiles:
      - web-api-admin
      - api
      - all

  # ===============================================
  # Legacy Web API
  # ===============================================
  legacy-web-api:
    build:
      context: ..
      dockerfile: bootstrap/bootstrap-legacy-web-api/Dockerfile
    container_name: setof-legacy-web-api
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: stage
      SERVER_PORT: 8088
      # OAuth
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID:-dummy}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:-dummy}
      # JWT
      JWT_SECRET: ${JWT_SECRET:-}
      # AWS (dummy for local - S3 not used)
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY:-dummy}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY:-dummy}
      # PortOne (disabled for local)
      PORTONE_ENABLED: "false"
      PORTONE_API_KEY: ${PORTONE_API_KEY:-dummy}
      PORTONE_API_SECRET: ${PORTONE_API_SECRET:-dummy}
      # Slack (disabled for local)
      SLACK_TOKEN: ${SLACK_TOKEN:-dummy}
      # Fileflow
      SECURITY_SERVICE_TOKEN_SECRET: ${SECURITY_SERVICE_TOKEN_SECRET:-dummy}
      JAVA_OPTS: >-
        -Xms512m -Xmx1536m
        -XX:+UseG1GC
        -XX:+UseContainerSupport
        -Djava.security.egd=file:/dev/./urandom
    ports:
      - "48082:8088"
    deploy:
      resources:
        limits:
          memory: 2048M
    <<: *common-settings
    profiles:
      - legacy-web-api
      - legacy
      - all

  # ===============================================
  # Legacy Web API Admin
  # ===============================================
  legacy-web-api-admin:
    build:
      context: ..
      dockerfile: bootstrap/bootstrap-legacy-web-api-admin/Dockerfile
    container_name: setof-legacy-web-api-admin
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: stage
      SERVER_PORT: 8080
    ports:
      - "48083:8080"
    <<: *common-settings
    profiles:
      - legacy-web-api-admin
      - legacy
      - all

  # ===============================================
  # Batch
  # ===============================================
  batch:
    build:
      context: ..
      dockerfile: bootstrap/bootstrap-batch/Dockerfile
    container_name: setof-batch
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: stage
      SERVER_PORT: 8080
    ports:
      - "48084:8080"
    <<: *common-settings
    profiles:
      - batch
      - all


