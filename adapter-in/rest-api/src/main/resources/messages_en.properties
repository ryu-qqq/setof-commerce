# ===============================================
# English Error Messages (messages_en.properties)
# ===============================================
# Used by Spring Boot MessageSource
# UTF-8 encoding required
#
# Usage:
# messageSource.getMessage("error.brand.not_found", args, locale)
#
# Parameter usage:
# {0}, {1}, {2} format to reference args array values
#
# @since 1.0.0
# ===============================================

# ===============================================
# Brand Domain Error Messages
# ===============================================

# Brand not found (404)
# Parameters: {0} = ID
error.brand.not_found=Brand not found (ID: {0})

# Brand already exists (409)
# Parameters: {0} = brand name
error.brand.already_exists=Brand already exists (name: {0})

# ===============================================
# Category Domain Error Messages
# ===============================================

# Category not found (404)
# Parameters: {0} = ID
error.category.not_found=Category not found (ID: {0})

# Category already exists (409)
# Parameters: {0} = category name
error.category.already_exists=Category already exists (name: {0})

# ===============================================
# Seller Domain Error Messages
# ===============================================

# Seller not found (404)
# Parameters: {0} = ID
error.seller.not_found=Seller not found (ID: {0})

# Seller already exists (409)
# Parameters: {0} = seller name
error.seller.already_exists=Seller already exists (name: {0})

# ===============================================
# Common Error Messages
# ===============================================

# Generic 400 Bad Request
error.common.bad_request=Bad request

# Generic 401 Unauthorized
error.common.unauthorized=Authentication required

# Generic 403 Forbidden
error.common.forbidden=Access forbidden

# Generic 404 Not Found
error.common.not_found=Resource not found

# Generic 409 Conflict
error.common.conflict=Resource conflict occurred

# Generic 500 Internal Server Error
error.common.internal_server_error=Internal server error. Please try again later
