# ===============================================
# 한국어 에러 메시지 (messages_ko.properties)
# ===============================================
# Spring Boot MessageSource에서 사용
# UTF-8 인코딩 필수
#
# 사용법:
# messageSource.getMessage("error.brand.not_found", args, locale)
#
# 파라미터 규칙:
# {0}, {1}, {2} 형식으로 args 배열의 값을 참조
#
# @since 1.0.0
# ===============================================

# ===============================================
# 브랜드 도메인 에러 메시지
# ===============================================

# 브랜드를 찾을 수 없음 (404)
# 파라미터: {0} = ID
error.brand.not_found=요청한 브랜드(ID: {0})를 찾을 수 없습니다.

# 브랜드가 이미 존재함 (409)
# 파라미터: {0} = 브랜드명
error.brand.already_exists=이미 존재하는 브랜드입니다. (이름: {0})

# ===============================================
# 카테고리 도메인 에러 메시지
# ===============================================

# 카테고리를 찾을 수 없음 (404)
# 파라미터: {0} = ID
error.category.not_found=요청한 카테고리(ID: {0})를 찾을 수 없습니다.

# 카테고리가 이미 존재함 (409)
# 파라미터: {0} = 카테고리명
error.category.already_exists=이미 존재하는 카테고리입니다. (이름: {0})

# ===============================================
# 셀러 도메인 에러 메시지
# ===============================================

# 셀러를 찾을 수 없음 (404)
# 파라미터: {0} = ID
error.seller.not_found=요청한 셀러(ID: {0})를 찾을 수 없습니다.

# 셀러가 이미 존재함 (409)
# 파라미터: {0} = 셀러명
error.seller.already_exists=이미 존재하는 셀러입니다. (이름: {0})

# ===============================================
# 공통 에러 메시지
# ===============================================

# 일반적인 400 Bad Request
error.common.bad_request=잘못된 요청입니다.

# 일반적인 401 Unauthorized
error.common.unauthorized=인증이 필요합니다.

# 일반적인 403 Forbidden
error.common.forbidden=접근 권한이 없습니다.

# 일반적인 404 Not Found
error.common.not_found=요청한 리소스를 찾을 수 없습니다.

# 일반적인 409 Conflict
error.common.conflict=리소스 충돌이 발생했습니다.

# 일반적인 500 Internal Server Error
error.common.internal_server_error=서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요.
