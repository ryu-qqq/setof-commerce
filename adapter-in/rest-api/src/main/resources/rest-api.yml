# ============================================================
# REST API Adapter 공통 설정
# ============================================================
# 환경별 설정은 rest-api-{profile}.yml 참조
# - rest-api-local.yml: 로컬 개발 환경
# - rest-api-stage.yml: 스테이지 환경
# - rest-api-prod.yml: 운영 환경
#
# @since 1.0.0
# ============================================================

spring:
  # ============================================================
  # MessageSource (i18n)
  # ============================================================
  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false

  # ============================================================
  # Jackson (JSON 직렬화/역직렬화)
  # ============================================================
  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss
    time-zone: Asia/Seoul

    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false
      FAIL_ON_EMPTY_BEANS: false

    deserialization:
      FAIL_ON_UNKNOWN_PROPERTIES: false

    default-property-inclusion: non_null

  # ============================================================
  # Web Configuration
  # ============================================================
  web:
    locale: ko_KR
    locale-resolver: fixed

  # ============================================================
  # MVC Configuration
  # ============================================================
  mvc:
    contentnegotiation:
      favor-parameter: false
      favor-path-extension: false

  # ============================================================
  # OAuth2 Configuration (Spring Security)
  # ============================================================
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID:your-kakao-client-id}
            client-secret: ${KAKAO_CLIENT_SECRET:your-kakao-client-secret}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - account_email
              - gender
              - name
              - birthday
              - birthyear
              - phone_number
            client-name: Kakao

        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

# ============================================================
# Error Response Configuration (RFC 7807)
# ============================================================
# @see com.ryuqq.adapter.in.rest.common.controller.GlobalExceptionHandler
api:
  error:
    base-url: about:blank
    use-about-blank: true

# ============================================================
# Security Configuration
# ============================================================
security:
  # 공개 엔드포인트 (인증 없이 접근 가능)
  public-endpoints:
    # Health Check (ALB, K8s 등 인프라 헬스체크용)
    - pattern: /actuator/health
    - pattern: /actuator/health/**
    # Prometheus Metrics (ADOT/AMP 메트릭 수집용)
    - pattern: /actuator/prometheus
    # API 문서
    - pattern: /docs
    - pattern: /docs/**
    - pattern: /v3/api-docs/**
    - pattern: /swagger-ui/**
    - pattern: /swagger-ui.html
    # 인증 API
    - method: POST
      pattern: /api/v2/auth/login
    # 회원가입
    - method: POST
      pattern: /api/v2/members
    # 비밀번호 재설정
    - method: POST
      pattern: /api/v2/members/passwordHash/reset
    # Health Check (API V2)
    - pattern: /api/v2/health
    # OAuth2
    - pattern: /oauth2/**
    - pattern: /login/oauth2/**
    # 공개 API (v1 - 비회원도 접근 가능)
    - pattern: /api/v1/brand/**
    - pattern: /api/v1/brands/**
    - pattern: /api/v1/category/**
    - pattern: /api/v1/categories/**
    - pattern: /api/v1/products/**
    - pattern: /api/v1/displays/**
    - pattern: /api/v1/sellers/**
    - pattern: /api/v1/reviews/**

  # JWT 설정 (프로덕션에서 반드시 환경변수로 변경)
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-for-jwt-signing-must-be-changed-in-production}
    access-token-expiration: 3600  # 1 hour (seconds)
    refresh-token-expiration: 604800  # 7 days (seconds)

  # Cookie 설정
  cookie:
    domain: ${COOKIE_DOMAIN:localhost}
    secure: ${COOKIE_SECURE:false}
    same-site: lax

  # CORS 설정
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:8080
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
    exposed-headers:
      - Authorization
      - Set-Cookie
      - X-Request-Id
    allow-credentials: true

# ============================================================
# API Documentation (Springdoc OpenAPI)
# ============================================================
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs

  swagger-ui:
    enabled: false

  packages-to-scan:
    - com.ryuqq.setof.adapter.in.rest

  default-consumes-media-type: application/json
  default-produces-media-type: application/json

  cache:
    disabled: true
