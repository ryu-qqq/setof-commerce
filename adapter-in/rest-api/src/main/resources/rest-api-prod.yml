# ============================================================
# REST API Adapter 운영 환경 설정
# ============================================================
# 활성화: spring.profiles.active=prod
#
# @since 1.0.0
# ============================================================

# ============================================================
# API Documentation (운영: 비활성화)
# ============================================================
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# ============================================================
# Error Response (운영: 상세 URL 제공)
# ============================================================
api:
  server:
    url: ${API_SERVER_URL:https://api.set-of.com}
  error:
    base-url: ${API_ERROR_DOCS_URL:https://api.set-of.com/problems}
    use-about-blank: false

# ============================================================
# Security (운영: 최대 보안)
# ============================================================
security:
  cookie:
    secure: true
    same-site: strict

# ============================================================
# Logging (운영: 최소화)
# ============================================================
logging:
  level:
    com.ryuqq.setof.adapter.in.rest: INFO
    org.springframework.security: WARN
    org.springframework.web: WARN
