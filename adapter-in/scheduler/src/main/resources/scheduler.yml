# ============================================================
# Scheduler Adapter 공통 설정
# ============================================================
# 환경별 설정은 scheduler-{profile}.yml 참조
# - scheduler-local.yml: 로컬 개발 환경
# - scheduler-stage.yml: 스테이징 환경
# - scheduler-prod.yml: 운영 환경
# ============================================================

# ============================================================
# Scheduler Job 설정
# ============================================================
scheduler:
  jobs:
    # SellerAuthOutbox 처리 스케줄러
    seller-auth-outbox:
      # PENDING 처리
      process-pending:
        enabled: false
        # Cron: 5분마다 (환경별 오버라이드 가능)
        cron: "0 */5 * * * *"
        timezone: Asia/Seoul
        # 배치 크기
        batch-size: 100
        # 처리 지연 (생성 후 N초 경과한 건만 처리)
        delay-seconds: 60

      # 타임아웃 복구
      recover-timeout:
        enabled: false
        # Cron: 10분마다 (환경별 오버라이드 가능)
        cron: "0 */10 * * * *"
        timezone: Asia/Seoul
        # 배치 크기
        batch-size: 100
        # 타임아웃 기준 (PROCESSING 상태에서 N초 경과 시 복구)
        timeout-seconds: 300

    # SellerAdminAuthOutbox 처리 스케줄러
    seller-admin-auth-outbox:
      # PENDING 처리
      process-pending:
        enabled: false
        # Cron: 5분마다 (환경별 오버라이드 가능)
        cron: "0 */5 * * * *"
        timezone: Asia/Seoul
        # 배치 크기
        batch-size: 100
        # 처리 지연 (생성 후 N초 경과한 건만 처리)
        delay-seconds: 60

      # 타임아웃 복구
      recover-timeout:
        enabled: false
        # Cron: 10분마다 (환경별 오버라이드 가능)
        cron: "0 */10 * * * *"
        timezone: Asia/Seoul
        # 배치 크기
        batch-size: 100
        # 타임아웃 기준 (PROCESSING 상태에서 N초 경과 시 복구)
        timeout-seconds: 300
