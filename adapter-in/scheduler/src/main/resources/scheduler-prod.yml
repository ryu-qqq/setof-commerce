# ============================================================
# Scheduler Adapter 운영 환경 설정
# ============================================================
# 활성화: spring.profiles.active=prod
# ============================================================

scheduler:
  jobs:
    seller-auth-outbox:
      process-pending:
        enabled: false
        # Prod: 5분마다 (기본값)
        cron: "0 */5 * * * *"
        # Prod: 큰 배치
        batch-size: 100
        # Prod: 안전한 지연
        delay-seconds: 60

      recover-timeout:
        enabled: false
        # Prod: 10분마다 (기본값)
        cron: "0 */10 * * * *"
        # Prod: 큰 배치
        batch-size: 100
        # Prod: 안전한 타임아웃
        timeout-seconds: 300

    seller-admin-auth-outbox:
      process-pending:
        enabled: false
        # Prod: 5분마다 (기본값)
        cron: "0 */5 * * * *"
        # Prod: 큰 배치
        batch-size: 100
        # Prod: 안전한 지연
        delay-seconds: 60

      recover-timeout:
        enabled: false
        # Prod: 10분마다 (기본값)
        cron: "0 */10 * * * *"
        # Prod: 큰 배치
        batch-size: 100
        # Prod: 안전한 타임아웃
        timeout-seconds: 300
