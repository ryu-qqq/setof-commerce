# ============================================================
# Scheduler Adapter 스테이징 환경 설정
# ============================================================
# 활성화: spring.profiles.active=stage
# ============================================================

scheduler:
  jobs:
    seller-auth-outbox:
      process-pending:
        enabled: false
        # Stage: 3분마다
        cron: "0 */3 * * * *"
        # Stage: 중간 배치
        batch-size: 50
        # Stage: 중간 지연
        delay-seconds: 30

      recover-timeout:
        enabled: false
        # Stage: 5분마다
        cron: "0 */5 * * * *"
        # Stage: 중간 배치
        batch-size: 50
        # Stage: 중간 타임아웃
        timeout-seconds: 180

    discount-outbox:
      publish-pending:
        enabled: true
        cron: "* * * * * *"
        batch-size: 50

      recover-stuck:
        enabled: true
        cron: "0 */5 * * * *"
        batch-size: 50
        timeout-seconds: 300

    seller-admin-auth-outbox:
      process-pending:
        enabled: false
        # Stage: 3분마다
        cron: "0 */3 * * * *"
        # Stage: 중간 배치
        batch-size: 50
        # Stage: 중간 지연
        delay-seconds: 30

      recover-timeout:
        enabled: false
        # Stage: 5분마다
        cron: "0 */5 * * * *"
        # Stage: 중간 배치
        batch-size: 50
        # Stage: 중간 타임아웃
        timeout-seconds: 180
