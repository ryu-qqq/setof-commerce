# ============================================================
# Scheduler Adapter 로컬 개발 환경 설정
# ============================================================
# 활성화: spring.profiles.active=local
# ============================================================

scheduler:
  jobs:
    seller-auth-outbox:
      process-pending:
        # 로컬: 1분마다 (빠른 테스트)
        cron: "0 */1 * * * *"
        # 로컬: 작은 배치
        batch-size: 10
        # 로컬: 짧은 지연
        delay-seconds: 10

      recover-timeout:
        # 로컬: 2분마다
        cron: "0 */2 * * * *"
        # 로컬: 작은 배치
        batch-size: 10
        # 로컬: 짧은 타임아웃
        timeout-seconds: 60

    seller-admin-auth-outbox:
      process-pending:
        # 로컬: 1분마다 (빠른 테스트)
        cron: "0 */1 * * * *"
        # 로컬: 작은 배치
        batch-size: 10
        # 로컬: 짧은 지연
        delay-seconds: 10

      recover-timeout:
        # 로컬: 2분마다
        cron: "0 */2 * * * *"
        # 로컬: 작은 배치
        batch-size: 10
        # 로컬: 짧은 타임아웃
        timeout-seconds: 60
