# ============================================================
# REST API Admin Adapter 스테이지 환경 설정
# ============================================================
# 활성화: spring.profiles.active=stage
#
# @since 1.0.0
# ============================================================

# ============================================================
# API Documentation (스테이지: 활성화)
# ============================================================
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /api/v2/swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true
  cache:
    disabled: false

# ============================================================
# Error Response (스테이지: 상세 URL 제공)
# ============================================================
api:
  server:
    url: https://stage-admin-api.set-of.com
  error:
    base-url: ${API_ERROR_DOCS_URL:https://stage-admin-api.set-of.com/problems}
    use-about-blank: false

# ============================================================
# Logging (스테이지: INFO 레벨)
# ============================================================
logging:
  level:
    com.ryuqq.setof.adapter.in.rest.admin: INFO
    org.springframework.security: WARN
    org.springframework.web: INFO
