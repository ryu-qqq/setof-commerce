# ============================================================
# REST API Admin Adapter 공통 설정
# ============================================================
# 환경별 설정은 rest-api-admin-{profile}.yml 참조
# - rest-api-admin-local.yml: 로컬 개발 환경
# - rest-api-admin-stage.yml: 스테이지 환경
# - rest-api-admin-prod.yml: 운영 환경
#
# @since 1.0.0
# ============================================================

spring:
  # ============================================================
  # MessageSource (i18n)
  # ============================================================
  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false

  # ============================================================
  # Jackson (JSON 직렬화/역직렬화)
  # ============================================================
  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss
    time-zone: Asia/Seoul

    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false
      FAIL_ON_EMPTY_BEANS: false

    deserialization:
      FAIL_ON_UNKNOWN_PROPERTIES: false

    default-property-inclusion: non_null

  # ============================================================
  # Web Configuration
  # ============================================================
  web:
    locale: ko_KR
    locale-resolver: fixed

  # ============================================================
  # MVC Configuration
  # ============================================================
  mvc:
    contentnegotiation:
      favor-parameter: false
      favor-path-extension: false

# ============================================================
# Error Response Configuration (RFC 7807)
# ============================================================
# @see com.ryuqq.adapter.in.rest.admin.common.controller.GlobalExceptionHandler
api:
  error:
    base-url: about:blank
    use-about-blank: true

# ============================================================
# Security Configuration
# ============================================================
# Admin API는 별도의 인증 방식 사용
security:
  # 공개 엔드포인트 (인증 없이 접근 가능)
  public-endpoints:
    # Health Check (ALB, K8s 등 인프라 헬스체크용)
    - pattern: /actuator/health
    - pattern: /actuator/health/**
    # Prometheus Metrics (ADOT/AMP 메트릭 수집용)
    - pattern: /actuator/prometheus
    # API 문서 (컨트롤러와 동일한 /api prefix 사용)
    - pattern: /api/v2/docs
    - pattern: /api/v2/docs/**
    - pattern: /api/v2/api-docs
    - pattern: /api/v2/api-docs/**
    - pattern: /api/v2/swagger-ui/**
    - pattern: /api/v2/swagger-ui.html

  # Admin API Key 설정 (프로덕션에서 반드시 환경변수로 변경)
  admin:
    api-key: ${ADMIN_API_KEY:admin-api-key-must-be-changed-in-production}

# ============================================================
# API Documentation (Springdoc OpenAPI)
# ============================================================
springdoc:
  api-docs:
    enabled: true
    path: /api/v2/api-docs

  swagger-ui:
    enabled: false

  packages-to-scan:
    - com.ryuqq.setof.adapter.in.rest.admin

  default-consumes-media-type: application/json
  default-produces-media-type: application/json

  cache:
    disabled: true
