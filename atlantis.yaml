# ============================================================================
# SetOf Commerce - Atlantis Configuration
# ============================================================================
# PR-based Terraform automation for SetOf Commerce infrastructure
# Directory structure: terraform/environments/{prod,stage}/{module}
# ============================================================================

version: 3

automerge: false
delete_source_branch_on_merge: false
# Disable parallel plan to prevent plugin cache conflicts
parallel_plan: false
parallel_apply: false

projects:
  # ============================================================================
  # PRODUCTION ENVIRONMENT
  # ============================================================================

  # ECR repository (Production)
  - name: setof-commerce-ecr-prod
    dir: terraform/environments/prod/ecr
    workspace: default
    autoplan:
      when_modified: ["*.tf", "*.tfvars", "../../../shared-*.tf"]
      enabled: true

  # ECS Cluster (Production)
  - name: setof-commerce-ecs-cluster-prod
    dir: terraform/environments/prod/ecs-cluster
    workspace: default
    autoplan:
      when_modified: ["*.tf", "*.tfvars", "../../../shared-*.tf"]
      enabled: true

  # ElastiCache Redis (Production)
  - name: setof-commerce-elasticache-prod
    dir: terraform/environments/prod/elasticache
    workspace: default
    autoplan:
      when_modified: ["*.tf", "*.tfvars", "../../../shared-*.tf"]
      enabled: true

  # ECS Service for web-api (Production)
  - name: setof-commerce-ecs-web-api-prod
    dir: terraform/environments/prod/ecs-web-api
    workspace: default
    autoplan:
      when_modified: ["*.tf", "*.tfvars", "../../../shared-*.tf"]
      enabled: true

  # ECS Service for web-api-admin (Production)
  - name: setof-commerce-ecs-web-api-admin-prod
    dir: terraform/environments/prod/ecs-web-api-admin
    workspace: default
    autoplan:
      when_modified: ["*.tf", "*.tfvars", "../../../shared-*.tf"]
      enabled: true

  # ECS Service for legacy-web-api (Production)
  # Strangler Fig Pattern: Legacy server migration
  - name: setof-commerce-ecs-web-api-legacy-prod
    dir: terraform/environments/prod/ecs-web-api-legacy
    workspace: default
    autoplan:
      when_modified: ["*.tf", "*.tfvars", "../../../shared-*.tf"]
      enabled: true

  # ECS Service for legacy-web-api-admin (Production)
  - name: setof-commerce-ecs-web-api-legacy-admin-prod
    dir: terraform/environments/prod/ecs-web-api-legacy-admin
    workspace: default
    autoplan:
      when_modified: ["*.tf", "*.tfvars", "../../../shared-*.tf"]
      enabled: true

  # ECS Service for batch (Production)
  - name: setof-commerce-ecs-batch-prod
    dir: terraform/environments/prod/ecs-batch
    workspace: default
    autoplan:
      when_modified: ["*.tf", "*.tfvars", "../../../shared-*.tf"]
      enabled: true

  # ============================================================================
  # STAGE ENVIRONMENT
  # ============================================================================

  # ECR repository (Stage)
  - name: setof-commerce-ecr-stage
    dir: terraform/environments/stage/ecr
    workspace: default
    autoplan:
      when_modified: ["*.tf", "*.tfvars"]
      enabled: true

  # ECS Cluster (Stage)
  - name: setof-commerce-ecs-cluster-stage
    dir: terraform/environments/stage/ecs-cluster
    workspace: default
    autoplan:
      when_modified: ["*.tf", "*.tfvars"]
      enabled: true

  # ECS Service for web-api (Stage)
  - name: setof-commerce-ecs-web-api-stage
    dir: terraform/environments/stage/ecs-web-api
    workspace: default
    autoplan:
      when_modified: ["*.tf", "*.tfvars"]
      enabled: true

  # ECS Service for web-api-admin (Stage)
  - name: setof-commerce-ecs-web-api-admin-stage
    dir: terraform/environments/stage/ecs-web-api-admin
    workspace: default
    autoplan:
      when_modified: ["*.tf", "*.tfvars"]
      enabled: true

  # ECS Service for legacy-web-api (Stage)
  - name: setof-commerce-ecs-web-api-legacy-stage
    dir: terraform/environments/stage/ecs-web-api-legacy
    workspace: default
    autoplan:
      when_modified: ["*.tf", "*.tfvars"]
      enabled: true

  # ECS Service for legacy-web-api-admin (Stage)
  - name: setof-commerce-ecs-web-api-legacy-admin-stage
    dir: terraform/environments/stage/ecs-web-api-legacy-admin
    workspace: default
    autoplan:
      when_modified: ["*.tf", "*.tfvars"]
      enabled: true

  # ECS Service for batch (Stage)
  - name: setof-commerce-ecs-batch-stage
    dir: terraform/environments/stage/ecs-batch
    workspace: default
    autoplan:
      when_modified: ["*.tf", "*.tfvars"]
      enabled: true

  # ============================================================================
  # MIGRATION (One-time)
  # ============================================================================

  # ECS Migration Service (데이터 마이그레이션용 - 일회성)
  - name: setof-commerce-ecs-migration
    dir: terraform/ecs-migration
    workspace: default
    autoplan:
      when_modified: ["*.tf", "*.tfvars"]
      enabled: true
