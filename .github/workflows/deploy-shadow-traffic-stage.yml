# ============================================================================
# Shadow Traffic Build & Push (Stage)
#
# tools/shadow-traffic 변경 시 Docker 이미지 빌드 & ECR 푸시
# Python 컨테이너 - Gradle 빌드 불필요
# ============================================================================

name: Shadow Traffic Build (Stage)

concurrency:
  group: shadow-traffic-stage
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches:
      - stage
    paths:
      - 'tools/shadow-traffic/**'

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: setof-commerce-shadow-traffic-stage

jobs:
  build-and-push:
    name: Build & Push Shadow Traffic Image
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      image-tag: ${{ steps.build.outputs.image-tag }}
      image-uri: ${{ steps.build.outputs.image-uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        id: build
        working-directory: tools/shadow-traffic
        run: |
          IMAGE_TAG="shadow-traffic-stage-${{ github.run_number }}-$(echo ${{ github.sha }} | cut -c1-7)"
          IMAGE_URI="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}"

          docker build -t ${IMAGE_URI} .
          docker push ${IMAGE_URI}

          # Also tag as latest
          docker tag ${IMAGE_URI} ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

          echo "image-tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "image-uri=${IMAGE_URI}" >> $GITHUB_OUTPUT

          echo "### Shadow Traffic Image Built" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${IMAGE_TAG}" >> $GITHUB_STEP_SUMMARY
          echo "- **URI**: ${IMAGE_URI}" >> $GITHUB_STEP_SUMMARY
