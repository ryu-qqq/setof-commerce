# ============================================================================
# SetOf Commerce Terraform Apply (Stage)
#
# Stage 환경 인프라 적용 워크플로우
# 트리거: stage-build-deploy.yml에서 호출
#
# 적용 대상 모듈:
# - ecr-stage: Stage ECR 레포지토리
# - ecs-cluster-stage: Stage ECS 클러스터
# - ecs-web-api-legacy-stage: Stage Legacy API
# - ecs-web-api-legacy-admin-stage: Stage Legacy Admin API
# - ecs-batch-stage: Stage Batch Jobs
# - ecs-scheduler-stage: Stage Scheduler (Outbox processing)
# ============================================================================

name: Terraform Apply (Stage)

on:
  workflow_dispatch:  # 수동 트리거 허용
  workflow_call:      # 다른 워크플로우에서 호출 가능
    inputs:
      legacy-api-image-tag:
        description: 'Legacy API Docker image tag (e.g., legacy-api-stage-1-abc1234)'
        required: false
        type: string
      legacy-api-admin-image-tag:
        description: 'Legacy API Admin Docker image tag (e.g., legacy-api-admin-stage-1-abc1234)'
        required: false
        type: string
      legacy-batch-image-tag:
        description: 'Legacy Batch Docker image tag (e.g., legacy-batch-stage-1-abc1234)'
        required: false
        type: string
      migration-image-tag:
        description: 'Migration Docker image tag (e.g., migration-stage-1-abc1234)'
        required: false
        type: string
      scheduler-image-tag:
        description: 'Scheduler Docker image tag (e.g., scheduler-stage-1-abc1234)'
        required: false
        type: string
    secrets:
      AWS_ROLE_ARN:
        required: true

permissions:
  contents: read
  id-token: write

env:
  ENVIRONMENT: stage
  AWS_REGION: ap-northeast-2

jobs:
  terraform-apply:
    name: Terraform Apply (Stage)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      # 순차 실행으로 변경 (의존성 고려)
      max-parallel: 1
      matrix:
        module:
          # 의존성 순서대로 배치
          - name: ecr-stage
            dir: terraform/environments/stage/ecr
            order: 0
          - name: ecs-cluster-stage
            dir: terraform/environments/stage/ecs-cluster
            order: 1
          - name: ecs-web-api-legacy-stage
            dir: terraform/environments/stage/ecs-web-api-legacy
            order: 2
          - name: ecs-web-api-legacy-admin-stage
            dir: terraform/environments/stage/ecs-web-api-legacy-admin
            order: 3
          - name: ecs-batch-stage
            dir: terraform/environments/stage/ecs-batch
            order: 4
          - name: ecs-migration-stage
            dir: terraform/environments/stage/ecs-migration
            order: 5
          - name: ecs-scheduler-stage
            dir: terraform/environments/stage/ecs-scheduler
            order: 6

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2
          role-duration-seconds: 3600
          role-session-name: GitHubActions-SetOfCommerce-TerraformApply-Stage

      - name: Check Module Directory Exists - ${{ matrix.module.name }}
        id: check-dir
        run: |
          if [ -d "${{ matrix.module.dir }}" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Module directory exists: ${{ matrix.module.dir }}"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ Module directory does not exist: ${{ matrix.module.dir }} - SKIPPING"
          fi

      - name: Terraform Init - ${{ matrix.module.name }}
        if: steps.check-dir.outputs.exists == 'true'
        working-directory: ${{ matrix.module.dir }}
        run: terraform init -reconfigure

      - name: Check and Import Existing Resources - ${{ matrix.module.name }}
        if: steps.check-dir.outputs.exists == 'true'
        working-directory: ${{ matrix.module.dir }}
        run: |
          echo "🔍 기존 리소스 확인 및 Import 중..."

          # ECR Stage 모듈: 기존 리소스 import 시도
          if [ "${{ matrix.module.name }}" == "ecr-stage" ]; then
            echo "📦 ECR Stage Repository 리소스 Import 중..."
            if aws ecr describe-repositories --repository-names setof-commerce-legacy-api-stage --region ap-northeast-2 >/dev/null 2>&1; then
              echo "  → Importing setof-commerce-legacy-api-stage ECR repository..."
              terraform import -input=false 'module.ecr_legacy_api.aws_ecr_repository.this' setof-commerce-legacy-api-stage || echo "  ⚠️ Import failed or already in state"
            fi
            if aws ecr describe-repositories --repository-names setof-commerce-legacy-api-admin-stage --region ap-northeast-2 >/dev/null 2>&1; then
              echo "  → Importing setof-commerce-legacy-api-admin-stage ECR repository..."
              terraform import -input=false 'module.ecr_legacy_api_admin.aws_ecr_repository.this' setof-commerce-legacy-api-admin-stage || echo "  ⚠️ Import failed or already in state"
            fi
            if aws ecr describe-repositories --repository-names setof-commerce-legacy-batch-stage --region ap-northeast-2 >/dev/null 2>&1; then
              echo "  → Importing setof-commerce-legacy-batch-stage ECR repository..."
              terraform import -input=false 'module.ecr_legacy_batch.aws_ecr_repository.this' setof-commerce-legacy-batch-stage || echo "  ⚠️ Import failed or already in state"
            fi
            if aws ecr describe-repositories --repository-names setof-commerce-scheduler-stage --region ap-northeast-2 >/dev/null 2>&1; then
              echo "  → Importing setof-commerce-scheduler-stage ECR repository..."
              terraform import -input=false 'module.ecr_scheduler.aws_ecr_repository.this' setof-commerce-scheduler-stage || echo "  ⚠️ Import failed or already in state"
            fi
          fi

          # ECS Stage 모듈: Security Group import 시도
          if [[ "${{ matrix.module.name }}" == ecs-*-stage ]]; then
            echo "🛡️ ECS Security Group Import 시도 중..."

            # Security Group 이름 결정
            case "${{ matrix.module.name }}" in
              "ecs-web-api-legacy-stage")
                SG_NAME="setof-commerce-legacy-api-sg-stage"
                ;;
              "ecs-web-api-legacy-admin-stage")
                SG_NAME="setof-commerce-legacy-admin-sg-stage"
                ;;
              "ecs-batch-stage")
                SG_NAME="setof-commerce-legacy-batch-sg-stage"
                ;;
              "ecs-scheduler-stage")
                SG_NAME="setof-commerce-scheduler-sg-stage"
                ;;
              "ecs-migration-stage")
                SG_NAME="setof-commerce-migration-sg-stage"
                ;;
              *)
                SG_NAME=""
                ;;
            esac

            if [ -n "$SG_NAME" ]; then
              SG_ID=$(aws ec2 describe-security-groups --filters "Name=group-name,Values=$SG_NAME" --query 'SecurityGroups[0].GroupId' --output text --region ap-northeast-2 2>/dev/null || echo "")
              if [ -n "$SG_ID" ] && [ "$SG_ID" != "None" ]; then
                echo "  → Importing Security Group: $SG_NAME ($SG_ID)"
                terraform import -input=false 'module.ecs_security_group.aws_security_group.this' "$SG_ID" || echo "  ⚠️ Import failed or already in state"
              else
                echo "  ℹ️ Security Group $SG_NAME not found in AWS (will be created)"
              fi
            fi
          fi

          # Plan 실행하여 충돌 확인
          set +e
          terraform plan -out=tfplan 2>&1 | tee plan_output.txt
          PLAN_EXIT_CODE=$?
          set -e

          # "already exists" 패턴 확인
          if grep -q "EntityAlreadyExists\|already exists" plan_output.txt; then
            echo "⚠️ 기존 리소스 발견! Import 작업 시작..."

            # ECS Cluster Stage 모듈
            if [ "${{ matrix.module.name }}" == "ecs-cluster-stage" ]; then
              echo "📦 ECS Cluster Stage 리소스 Import 중..."
              CLUSTER_ARN=$(aws ecs describe-clusters --clusters setof-commerce-cluster-stage --region ap-northeast-2 --query 'clusters[0].clusterArn' --output text 2>/dev/null || echo "")
              if [ -n "$CLUSTER_ARN" ] && [ "$CLUSTER_ARN" != "None" ]; then
                echo "  → Importing ECS Cluster: $CLUSTER_ARN"
                terraform import -input=false aws_ecs_cluster.main "$CLUSTER_ARN" || echo "  ⚠️ Import failed or already in state"
              fi
            fi

            # ECS Web API Legacy Stage 모듈
            if [ "${{ matrix.module.name }}" == "ecs-web-api-legacy-stage" ]; then
              echo "📦 ECS Legacy API Stage 리소스 Import 중..."

              # ALB
              ALB_ARN=$(aws elbv2 describe-load-balancers --names setof-commerce-legacy-alb-stage --region ap-northeast-2 --query 'LoadBalancers[0].LoadBalancerArn' --output text 2>/dev/null || echo "")
              if [ -n "$ALB_ARN" ] && [ "$ALB_ARN" != "None" ]; then
                echo "  → Importing ALB: $ALB_ARN"
                terraform import -input=false aws_lb.legacy_api "$ALB_ARN" || echo "  ⚠️ Import failed or already in state"
              fi

              # Target Group
              TG_ARN=$(aws elbv2 describe-target-groups --names setof-commerce-legacy-tg-stage --region ap-northeast-2 --query 'TargetGroups[0].TargetGroupArn' --output text 2>/dev/null || echo "")
              if [ -n "$TG_ARN" ] && [ "$TG_ARN" != "None" ]; then
                echo "  → Importing Target Group: $TG_ARN"
                terraform import -input=false aws_lb_target_group.legacy_api "$TG_ARN" || echo "  ⚠️ Import failed or already in state"
              fi
            fi

            # ECS Web API Legacy Admin Stage 모듈
            if [ "${{ matrix.module.name }}" == "ecs-web-api-legacy-admin-stage" ]; then
              echo "📦 ECS Legacy Admin API Stage 리소스 Import 중..."

              # ALB
              ALB_ARN=$(aws elbv2 describe-load-balancers --names setof-commerce-legacy-admin-alb-stage --region ap-northeast-2 --query 'LoadBalancers[0].LoadBalancerArn' --output text 2>/dev/null || echo "")
              if [ -n "$ALB_ARN" ] && [ "$ALB_ARN" != "None" ]; then
                echo "  → Importing ALB: $ALB_ARN"
                terraform import -input=false aws_lb.legacy_admin_api "$ALB_ARN" || echo "  ⚠️ Import failed or already in state"
              fi

              # Target Group
              TG_ARN=$(aws elbv2 describe-target-groups --names setof-commerce-legacy-admin-tg-stage --region ap-northeast-2 --query 'TargetGroups[0].TargetGroupArn' --output text 2>/dev/null || echo "")
              if [ -n "$TG_ARN" ] && [ "$TG_ARN" != "None" ]; then
                echo "  → Importing Target Group: $TG_ARN"
                terraform import -input=false aws_lb_target_group.legacy_admin_api "$TG_ARN" || echo "  ⚠️ Import failed or already in state"
              fi
            fi

            # ECS Batch Stage 모듈
            if [ "${{ matrix.module.name }}" == "ecs-batch-stage" ]; then
              echo "ℹ️ ECS Batch Stage uses RunTask only (no ECS Service to import)"
              echo "ℹ️ EventBridge Schedules and IAM roles will be created fresh"
            fi

            echo "✅ Import 완료! Plan 재실행..."
            terraform plan -out=tfplan
          else
            echo "✅ 기존 리소스 없음 또는 State와 일치. 정상 진행."
          fi

          rm -f plan_output.txt

      - name: Terraform Apply - ${{ matrix.module.name }}
        if: steps.check-dir.outputs.exists == 'true'
        working-directory: ${{ matrix.module.dir }}
        run: |
          echo "🚀 Applying Terraform for ${{ matrix.module.name }}..."

          # Image Tag 변수 설정 (Build & Deploy 워크플로우에서 전달됨)
          EXTRA_VARS=""

          if [ "${{ matrix.module.name }}" == "ecs-web-api-legacy-stage" ] && [ -n "${{ inputs.legacy-api-image-tag }}" ]; then
            echo "📦 Using Legacy API Stage image tag: ${{ inputs.legacy-api-image-tag }}"
            EXTRA_VARS="-var=image_tag=${{ inputs.legacy-api-image-tag }}"
          elif [ "${{ matrix.module.name }}" == "ecs-web-api-legacy-admin-stage" ] && [ -n "${{ inputs.legacy-api-admin-image-tag }}" ]; then
            echo "📦 Using Legacy Admin API Stage image tag: ${{ inputs.legacy-api-admin-image-tag }}"
            EXTRA_VARS="-var=image_tag=${{ inputs.legacy-api-admin-image-tag }}"
          elif [ "${{ matrix.module.name }}" == "ecs-batch-stage" ] && [ -n "${{ inputs.legacy-batch-image-tag }}" ]; then
            echo "📦 Using Legacy Batch Stage image tag: ${{ inputs.legacy-batch-image-tag }}"
            EXTRA_VARS="-var=image_tag=${{ inputs.legacy-batch-image-tag }}"
          elif [ "${{ matrix.module.name }}" == "ecs-migration-stage" ] && [ -n "${{ inputs.migration-image-tag }}" ]; then
            echo "📦 Using Migration Stage image tag: ${{ inputs.migration-image-tag }}"
            EXTRA_VARS="-var=image_tag=${{ inputs.migration-image-tag }}"
          elif [ "${{ matrix.module.name }}" == "ecs-scheduler-stage" ] && [ -n "${{ inputs.scheduler-image-tag }}" ]; then
            echo "📦 Using Scheduler Stage image tag: ${{ inputs.scheduler-image-tag }}"
            EXTRA_VARS="-var=image_tag=${{ inputs.scheduler-image-tag }}"
          else
            echo "ℹ️ No image tag provided for ${{ matrix.module.name }}, using default from provider.tf"
          fi

          # Terraform Plan with optional image_tag variable
          echo "📋 Generating fresh terraform plan..."
          terraform plan $EXTRA_VARS -out=tfplan

          terraform apply -auto-approve -no-color tfplan
          echo "✅ Apply completed for ${{ matrix.module.name }}"

      - name: Terraform Output - ${{ matrix.module.name }}
        if: steps.check-dir.outputs.exists == 'true'
        working-directory: ${{ matrix.module.dir }}
        run: |
          echo "📋 Outputs for ${{ matrix.module.name }}:"
          terraform output -json > outputs-${{ matrix.module.name }}.json
          terraform output

      - name: Upload Apply Results - ${{ matrix.module.name }}
        uses: actions/upload-artifact@v4
        if: always() && steps.check-dir.outputs.exists == 'true'
        with:
          name: apply-results-${{ matrix.module.name }}
          path: ${{ matrix.module.dir }}/outputs-${{ matrix.module.name }}.json
          retention-days: 30

  notify-completion:
    name: Notify Stage Deployment Completion
    needs: terraform-apply
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Create Deployment Summary
        run: |
          echo "## 🎉 SetOf Commerce Stage Infrastructure Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: ${{ needs.terraform-apply.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Environment**: Stage" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed by**: @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Modules Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ECR Repository (Stage)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ECS Cluster (Stage)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ECS Legacy API (Stage)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ECS Legacy Admin API (Stage)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ECS Batch (Stage - RunTask only)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ECS Scheduler (Stage - Outbox processing)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Stage Application URLs**:" >> $GITHUB_STEP_SUMMARY
          echo "- Legacy API: https://stage-server.set-of.com" >> $GITHUB_STEP_SUMMARY
          echo "- Legacy Admin API: https://stage-partner.set-of.com" >> $GITHUB_STEP_SUMMARY
          echo "- Batch: EventBridge scheduled (no public endpoint)" >> $GITHUB_STEP_SUMMARY
          echo "- Scheduler: Internal service (Outbox processing)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next Steps**:" >> $GITHUB_STEP_SUMMARY
          echo "1. Verify infrastructure in AWS Console" >> $GITHUB_STEP_SUMMARY
          echo "2. Check CloudWatch logs" >> $GITHUB_STEP_SUMMARY
          echo "3. Run E2E tests against Stage environment" >> $GITHUB_STEP_SUMMARY
          echo "4. If tests pass, proceed to Production deployment" >> $GITHUB_STEP_SUMMARY
