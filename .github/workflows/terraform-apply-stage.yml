# ============================================================================
# SetOf Commerce Terraform Apply (Stage)
#
# Stage 환경 인프라 적용 워크플로우
# 트리거: stage-build-deploy.yml에서 호출
#
# 적용 대상 모듈:
# - ecr-stage: Stage ECR 레포지토리
# - ecs-cluster-stage: Stage ECS 클러스터
# - ecs-batch-stage: Stage Batch (EventBridge + RunTask)
# - ecs-web-api-legacy-stage: Stage Legacy API
# - ecs-web-api-legacy-admin-stage: Stage Legacy Admin API
# - ecs-web-api-stage: Stage Web API (New)
# - ecs-web-api-admin-stage: Stage Web API Admin (New)
# - ecs-scheduler-stage: Stage Scheduler (SellerAuthOutbox)
# - ecs-migration-stage: Stage Migration
# ============================================================================

name: Terraform Apply (Stage)

on:
  workflow_dispatch:  # 수동 트리거 허용
  workflow_call:      # 다른 워크플로우에서 호출 가능
    inputs:
      legacy-api-image-tag:
        description: 'Legacy API Docker image tag'
        required: false
        type: string
      legacy-api-admin-image-tag:
        description: 'Legacy API Admin Docker image tag'
        required: false
        type: string
      web-api-image-tag:
        description: 'Web API Docker image tag'
        required: false
        type: string
      web-api-admin-image-tag:
        description: 'Web API Admin Docker image tag'
        required: false
        type: string
      scheduler-image-tag:
        description: 'Scheduler Docker image tag'
        required: false
        type: string
      migration-image-tag:
        description: 'Migration Docker image tag'
        required: false
        type: string
    secrets:
      AWS_ROLE_ARN:
        required: true

permissions:
  contents: read
  id-token: write

env:
  ENVIRONMENT: stage
  AWS_REGION: ap-northeast-2

jobs:
  terraform-apply:
    name: Terraform Apply (Stage)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      # 순차 실행으로 변경 (의존성 고려)
      max-parallel: 1
      matrix:
        module:
          # 의존성 순서대로 배치
          - name: ecr-stage
            dir: terraform/environments/stage/ecr
            order: 0
          - name: ecs-cluster-stage
            dir: terraform/ecs-cluster-stage
            order: 1
          - name: ecs-batch-stage
            dir: terraform/ecs-batch-stage
            order: 2
          - name: ecs-web-api-legacy-stage
            dir: terraform/ecs-web-api-legacy-stage
            order: 3
          - name: ecs-web-api-legacy-admin-stage
            dir: terraform/ecs-web-api-legacy-admin-stage
            order: 4
          - name: ecs-web-api-stage
            dir: terraform/ecs-web-api-stage
            order: 5
          - name: ecs-web-api-admin-stage
            dir: terraform/ecs-web-api-admin-stage
            order: 6
          - name: ecs-scheduler-stage
            dir: terraform/environments/stage/ecs-scheduler
            order: 7
          - name: ecs-migration-stage
            dir: terraform/environments/stage/ecs-migration
            order: 8

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2
          role-duration-seconds: 3600
          role-session-name: GitHubActions-SetOfCommerce-TerraformApply-Stage

      - name: Check Module Directory Exists - ${{ matrix.module.name }}
        id: check-dir
        run: |
          if [ -d "${{ matrix.module.dir }}" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Module directory exists: ${{ matrix.module.dir }}"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ Module directory does not exist: ${{ matrix.module.dir }} - SKIPPING"
          fi

      - name: Terraform Init - ${{ matrix.module.name }}
        if: steps.check-dir.outputs.exists == 'true'
        working-directory: ${{ matrix.module.dir }}
        run: terraform init -reconfigure -upgrade  # 모듈 업데이트를 위해 -upgrade 추가

      - name: Check and Import Existing Resources - ${{ matrix.module.name }}
        if: steps.check-dir.outputs.exists == 'true'
        working-directory: ${{ matrix.module.dir }}
        run: |
          echo "🔍 기존 리소스 확인 및 Import 중..."

          # ECR Stage 모듈: 기존 리소스 import 시도
          if [ "${{ matrix.module.name }}" == "ecr-stage" ]; then
            echo "📦 ECR Stage Repository 리소스 Import 중..."
            for REPO in legacy-api legacy-api-admin web-api web-api-admin legacy-batch migration; do
              REPO_NAME="setof-commerce-${REPO}-stage"
              if aws ecr describe-repositories --repository-names $REPO_NAME --region ap-northeast-2 >/dev/null 2>&1; then
                echo "  → Importing $REPO_NAME ECR repository..."
                terraform import -input=false "module.ecr_${REPO//-/_}.aws_ecr_repository.this" $REPO_NAME || echo "  ⚠️ Import failed or already in state"
              fi
            done
          fi

          # ECS Stage 모듈: Security Group import 시도
          if [[ "${{ matrix.module.name }}" == ecs-*-stage ]]; then
            echo "🛡️ ECS Security Group Import 시도 중..."

            # Security Group 이름 결정
            case "${{ matrix.module.name }}" in
              "ecs-web-api-legacy-stage")
                SG_NAME="setof-commerce-legacy-api-sg-stage"
                ;;
              "ecs-web-api-legacy-admin-stage")
                SG_NAME="setof-commerce-legacy-admin-sg-stage"
                ;;
              "ecs-web-api-stage")
                SG_NAME="setof-commerce-web-api-sg-stage"
                ;;
              "ecs-web-api-admin-stage")
                SG_NAME="setof-commerce-web-api-admin-sg-stage"
                ;;
              "ecs-scheduler-stage")
                SG_NAME="setof-commerce-scheduler-sg-stage"
                ;;
              "ecs-migration-stage")
                SG_NAME="setof-commerce-migration-sg-stage"
                ;;
              *)
                SG_NAME=""
                ;;
            esac

            if [ -n "$SG_NAME" ]; then
              SG_ID=$(aws ec2 describe-security-groups --filters "Name=group-name,Values=$SG_NAME" --query 'SecurityGroups[0].GroupId' --output text --region ap-northeast-2 2>/dev/null || echo "")
              if [ -n "$SG_ID" ] && [ "$SG_ID" != "None" ]; then
                echo "  → Importing Security Group: $SG_NAME ($SG_ID)"
                terraform import -input=false 'module.ecs_security_group.aws_security_group.this' "$SG_ID" || echo "  ⚠️ Import failed or already in state"
              else
                echo "  ℹ️ Security Group $SG_NAME not found in AWS (will be created)"
              fi
            fi
          fi

          # Plan 실행하여 충돌 확인
          set +e
          terraform plan -out=tfplan 2>&1 | tee plan_output.txt
          PLAN_EXIT_CODE=$?
          set -e

          # "already exists" 패턴 확인
          if grep -q "EntityAlreadyExists\|already exists" plan_output.txt; then
            echo "⚠️ 기존 리소스 발견! Import 작업 시작..."

            # ECS Cluster Stage 모듈
            if [ "${{ matrix.module.name }}" == "ecs-cluster-stage" ]; then
              echo "📦 ECS Cluster Stage 리소스 Import 중..."
              CLUSTER_ARN=$(aws ecs describe-clusters --clusters setof-commerce-cluster-stage --region ap-northeast-2 --query 'clusters[0].clusterArn' --output text 2>/dev/null || echo "")
              if [ -n "$CLUSTER_ARN" ] && [ "$CLUSTER_ARN" != "None" ]; then
                echo "  → Importing ECS Cluster: $CLUSTER_ARN"
                terraform import -input=false aws_ecs_cluster.main "$CLUSTER_ARN" || echo "  ⚠️ Import failed or already in state"
              fi
            fi

            echo "✅ Import 완료! Plan 재실행..."
            terraform plan -out=tfplan
          else
            echo "✅ 기존 리소스 없음 또는 State와 일치. 정상 진행."
          fi

          rm -f plan_output.txt

      - name: Terraform Apply - ${{ matrix.module.name }}
        if: steps.check-dir.outputs.exists == 'true'
        working-directory: ${{ matrix.module.dir }}
        run: |
          echo "🚀 Applying Terraform for ${{ matrix.module.name }}..."

          # Image Tag 변수 설정 (Build & Deploy 워크플로우에서 전달됨)
          EXTRA_VARS=""

          case "${{ matrix.module.name }}" in
            "ecs-web-api-legacy-stage")
              if [ -n "${{ inputs.legacy-api-image-tag }}" ]; then
                echo "📦 Using Legacy API Stage image tag: ${{ inputs.legacy-api-image-tag }}"
                EXTRA_VARS="-var=image_tag=${{ inputs.legacy-api-image-tag }}"
              fi
              ;;
            "ecs-web-api-legacy-admin-stage")
              if [ -n "${{ inputs.legacy-api-admin-image-tag }}" ]; then
                echo "📦 Using Legacy Admin API Stage image tag: ${{ inputs.legacy-api-admin-image-tag }}"
                EXTRA_VARS="-var=image_tag=${{ inputs.legacy-api-admin-image-tag }}"
              fi
              ;;
            "ecs-web-api-stage")
              if [ -n "${{ inputs.web-api-image-tag }}" ]; then
                echo "📦 Using Web API Stage image tag: ${{ inputs.web-api-image-tag }}"
                EXTRA_VARS="-var=image_tag=${{ inputs.web-api-image-tag }}"
              fi
              ;;
            "ecs-web-api-admin-stage")
              if [ -n "${{ inputs.web-api-admin-image-tag }}" ]; then
                echo "📦 Using Web API Admin Stage image tag: ${{ inputs.web-api-admin-image-tag }}"
                EXTRA_VARS="-var=image_tag=${{ inputs.web-api-admin-image-tag }}"
              fi
              ;;
            "ecs-scheduler-stage")
              if [ -n "${{ inputs.scheduler-image-tag }}" ]; then
                echo "📦 Using Scheduler Stage image tag: ${{ inputs.scheduler-image-tag }}"
                EXTRA_VARS="-var=image_tag=${{ inputs.scheduler-image-tag }}"
              fi
              ;;
            "ecs-migration-stage")
              if [ -n "${{ inputs.migration-image-tag }}" ]; then
                echo "📦 Using Migration Stage image tag: ${{ inputs.migration-image-tag }}"
                EXTRA_VARS="-var=image_tag=${{ inputs.migration-image-tag }}"
              fi
              ;;
            *)
              echo "ℹ️ No image tag provided for ${{ matrix.module.name }}, using default"
              ;;
          esac

          # Terraform Plan with optional image_tag variable
          echo "📋 Generating fresh terraform plan..."
          terraform plan $EXTRA_VARS -out=tfplan

          terraform apply -auto-approve -no-color tfplan
          echo "✅ Apply completed for ${{ matrix.module.name }}"

      - name: Terraform Output - ${{ matrix.module.name }}
        if: steps.check-dir.outputs.exists == 'true'
        working-directory: ${{ matrix.module.dir }}
        run: |
          echo "📋 Outputs for ${{ matrix.module.name }}:"
          terraform output -json > outputs-${{ matrix.module.name }}.json
          terraform output

      - name: Upload Apply Results - ${{ matrix.module.name }}
        uses: actions/upload-artifact@v4
        if: always() && steps.check-dir.outputs.exists == 'true'
        with:
          name: apply-results-${{ matrix.module.name }}
          path: ${{ matrix.module.dir }}/outputs-${{ matrix.module.name }}.json
          retention-days: 30

  notify-completion:
    name: Notify Stage Deployment Completion
    needs: terraform-apply
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Create Deployment Summary
        run: |
          echo "## 🎉 SetOf Commerce Stage Infrastructure Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: ${{ needs.terraform-apply.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Environment**: Stage" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed by**: @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Modules Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ECR Repository (Stage)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ECS Cluster (Stage)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ECS Batch (Stage) - EventBridge RunTask" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ECS Legacy API (Stage)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ECS Legacy Admin API (Stage)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ECS Web API (Stage)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ECS Web API Admin (Stage)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ECS Scheduler (Stage)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ECS Migration (Stage)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Stage Application URLs**:" >> $GITHUB_STEP_SUMMARY
          echo "- Legacy API: https://stage-server.set-of.com" >> $GITHUB_STEP_SUMMARY
          echo "- Legacy Admin API: https://stage-partner.set-of.com" >> $GITHUB_STEP_SUMMARY
          echo "- Scheduler: Internal (Service Discovery)" >> $GITHUB_STEP_SUMMARY
          echo "- Migration: Internal (Service Discovery)" >> $GITHUB_STEP_SUMMARY
