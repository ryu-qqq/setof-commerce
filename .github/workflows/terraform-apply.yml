name: Terraform Apply

on:
  workflow_dispatch:  # 수동 트리거 허용
  workflow_call:      # 다른 워크플로우에서 호출 가능
    inputs:
      web-api-image-tag:
        description: 'Web API Docker image tag (e.g., web-api-1-abc1234)'
        required: false
        type: string
      web-api-admin-image-tag:
        description: 'Web API Admin Docker image tag (e.g., web-api-admin-1-abc1234)'
        required: false
        type: string
      legacy-api-image-tag:
        description: 'Legacy API Docker image tag (e.g., legacy-api-1-abc1234)'
        required: false
        type: string
      legacy-api-admin-image-tag:
        description: 'Legacy API Admin Docker image tag (e.g., legacy-api-admin-1-abc1234)'
        required: false
        type: string
      migration-image-tag:
        description: 'Migration service Docker image tag (e.g., migration-1-abc1234)'
        required: false
        type: string
      legacy-batch-image-tag:
        description: 'Legacy Batch Docker image tag (e.g., legacy-batch-1-abc1234)'
        required: false
        type: string
      scheduler-image-tag:
        description: 'Scheduler Docker image tag (e.g., scheduler-1-abc1234)'
        required: false
        type: string
    secrets:
      AWS_ROLE_ARN:
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      # 순차 실행으로 변경 (의존성 고려)
      max-parallel: 1
      matrix:
        module:
          # 의존성 순서대로 배치
          - name: ecr
            dir: terraform/environments/prod/ecr
            order: 0
          - name: ecs-cluster
            dir: terraform/environments/prod/ecs-cluster
            order: 1
          - name: elasticache
            dir: terraform/environments/prod/elasticache
            order: 2
          - name: ecs-web-api
            dir: terraform/environments/prod/ecs-web-api
            order: 3
          - name: ecs-web-api-admin
            dir: terraform/environments/prod/ecs-web-api-admin
            order: 4
          - name: ecs-web-api-legacy
            dir: terraform/environments/prod/ecs-web-api-legacy
            order: 5
          - name: ecs-web-api-legacy-admin
            dir: terraform/environments/prod/ecs-web-api-legacy-admin
            order: 6
          # NOTE: ecs-migration 임시 비활성화 - legacy RDS 시크릿 미생성 상태
          # 시크릿 생성 후 다시 활성화: setof-commerce/legacy-rds/credentials
          # - name: ecs-migration
          #   dir: terraform/ecs-migration
          #   order: 7
          - name: ecs-batch
            dir: terraform/environments/prod/ecs-batch
            order: 8
          - name: ecs-scheduler
            dir: terraform/environments/prod/ecs-scheduler
            order: 9

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2
          role-duration-seconds: 3600
          role-session-name: GitHubActions-SetOfCommerce-TerraformApply

      - name: Terraform Init - ${{ matrix.module.name }}
        working-directory: ${{ matrix.module.dir }}
        run: terraform init -reconfigure

      - name: Check and Import Existing Resources - ${{ matrix.module.name }}
        working-directory: ${{ matrix.module.dir }}
        run: |
          echo "🔍 기존 리소스 확인 및 Import 중..."

          # ECR 모듈: 항상 기존 리소스 import 시도 (apply 시 RepositoryAlreadyExistsException 방지)
          if [ "${{ matrix.module.name }}" == "ecr" ]; then
            echo "🧹 OLD ECR Repository state 정리 중..."
            # OLD repo (setof-commerce-legacy-admin-prod - "-api-" 없는 이전 버전)가 state에 있으면 제거
            # 이 repo는 더 이상 Terraform으로 관리하지 않음
            OLD_ECR_RESOURCES=$(terraform state list 2>/dev/null | grep -E 'ecr.*legacy.*admin' | grep -v 'api' || true)
            if [ -n "$OLD_ECR_RESOURCES" ]; then
              echo "  ⚠️  OLD ECR resources found in state, removing to prevent force_delete..."
              for resource in $OLD_ECR_RESOURCES; do
                echo "  → Removing from state: $resource"
                terraform state rm "$resource" || echo "  ⚠️  Failed to remove $resource"
              done
            fi

            echo "📦 ECR Repository 리소스 Import 중..."
            if aws ecr describe-repositories --repository-names setof-commerce-web-api-prod --region ap-northeast-2 >/dev/null 2>&1; then
              echo "  → Importing setof-commerce-web-api-prod ECR repository..."
              terraform import -input=false 'module.ecr_web_api.aws_ecr_repository.this' setof-commerce-web-api-prod || echo "  ⚠️  Import failed or already in state"
            fi
            if aws ecr describe-repositories --repository-names setof-commerce-web-api-admin-prod --region ap-northeast-2 >/dev/null 2>&1; then
              echo "  → Importing setof-commerce-web-api-admin-prod ECR repository..."
              terraform import -input=false 'module.ecr_web_api_admin.aws_ecr_repository.this' setof-commerce-web-api-admin-prod || echo "  ⚠️  Import failed or already in state"
            fi
            if aws ecr describe-repositories --repository-names setof-commerce-legacy-api-prod --region ap-northeast-2 >/dev/null 2>&1; then
              echo "  → Importing setof-commerce-legacy-api-prod ECR repository..."
              terraform import -input=false 'module.ecr_legacy_api.aws_ecr_repository.this' setof-commerce-legacy-api-prod || echo "  ⚠️  Import failed or already in state"
            fi
            if aws ecr describe-repositories --repository-names setof-commerce-legacy-api-admin-prod --region ap-northeast-2 >/dev/null 2>&1; then
              echo "  → Importing setof-commerce-legacy-api-admin-prod ECR repository..."
              terraform import -input=false 'module.ecr_legacy_api_admin.aws_ecr_repository.this' setof-commerce-legacy-api-admin-prod || echo "  ⚠️  Import failed or already in state"
            fi
            if aws ecr describe-repositories --repository-names setof-commerce-migration-prod --region ap-northeast-2 >/dev/null 2>&1; then
              echo "  → Importing setof-commerce-migration-prod ECR repository..."
              terraform import -input=false 'module.ecr_migration.aws_ecr_repository.this' setof-commerce-migration-prod || echo "  ⚠️  Import failed or already in state"
            fi
            if aws ecr describe-repositories --repository-names setof-commerce-legacy-batch-prod --region ap-northeast-2 >/dev/null 2>&1; then
              echo "  → Importing setof-commerce-legacy-batch-prod ECR repository..."
              terraform import -input=false 'module.ecr_legacy_batch.aws_ecr_repository.this' setof-commerce-legacy-batch-prod || echo "  ⚠️  Import failed or already in state"
            fi
            if aws ecr describe-repositories --repository-names setof-commerce-scheduler-prod --region ap-northeast-2 >/dev/null 2>&1; then
              echo "  → Importing setof-commerce-scheduler-prod ECR repository..."
              terraform import -input=false 'module.ecr_scheduler.aws_ecr_repository.this' setof-commerce-scheduler-prod || echo "  ⚠️  Import failed or already in state"
            fi
          fi

          # ECS 모듈: Security Group import 시도 (apply 시 InvalidGroup.Duplicate 방지)
          if [[ "${{ matrix.module.name }}" == ecs-web-api* ]] || [[ "${{ matrix.module.name }}" == ecs-migration ]] || [[ "${{ matrix.module.name }}" == ecs-batch ]] || [[ "${{ matrix.module.name }}" == ecs-scheduler ]]; then
            echo "🛡️  ECS Security Group Import 시도 중..."

            # Security Group 이름 결정
            case "${{ matrix.module.name }}" in
              "ecs-web-api")
                SG_NAME="setof-commerce-web-api-sg-prod"
                ;;
              "ecs-web-api-admin")
                SG_NAME="setof-commerce-web-api-admin-sg-prod"
                ;;
              "ecs-web-api-legacy")
                SG_NAME="setof-commerce-legacy-api-sg-prod"
                ;;
              "ecs-web-api-legacy-admin")
                SG_NAME="setof-commerce-legacy-admin-sg-prod"
                ;;
              "ecs-migration")
                SG_NAME="setof-commerce-migration-sg-prod"
                ;;
              "ecs-batch")
                SG_NAME="setof-commerce-legacy-batch-sg-prod"
                ;;
              "ecs-scheduler")
                SG_NAME="setof-commerce-scheduler-sg-prod"
                ;;
              *)
                SG_NAME=""
                ;;
            esac

            if [ -n "$SG_NAME" ]; then
              SG_ID=$(aws ec2 describe-security-groups --filters "Name=group-name,Values=$SG_NAME" --query 'SecurityGroups[0].GroupId' --output text --region ap-northeast-2 2>/dev/null || echo "")
              if [ -n "$SG_ID" ] && [ "$SG_ID" != "None" ]; then
                echo "  → Importing Security Group: $SG_NAME ($SG_ID)"
                terraform import -input=false 'module.ecs_security_group.aws_security_group.this' "$SG_ID" || echo "  ⚠️  Import failed or already in state"
              else
                echo "  ℹ️  Security Group $SG_NAME not found in AWS (will be created)"
              fi
            fi
          fi

          # Plan 실행하여 충돌 확인
          set +e
          terraform plan -out=tfplan 2>&1 | tee plan_output.txt
          PLAN_EXIT_CODE=$?
          set -e

          # 409 에러 또는 "already exists" 패턴 확인 (ECR 외 다른 모듈용)
          if grep -q "EntityAlreadyExists\|already exists" plan_output.txt; then
            echo "⚠️  기존 리소스 발견! Import 작업 시작..."

            # ECS Cluster 모듈
            if [ "${{ matrix.module.name }}" == "ecs-cluster" ]; then
              echo "📦 ECS Cluster 리소스 Import 중..."
              CLUSTER_ARN=$(aws ecs describe-clusters --clusters setof-commerce-cluster-prod --region ap-northeast-2 --query 'clusters[0].clusterArn' --output text 2>/dev/null || echo "")
              if [ -n "$CLUSTER_ARN" ] && [ "$CLUSTER_ARN" != "None" ]; then
                echo "  → Importing ECS Cluster: $CLUSTER_ARN"
                terraform import -input=false aws_ecs_cluster.main "$CLUSTER_ARN" || echo "  ⚠️  Import failed or already in state"
              fi
            fi

            # ElastiCache 모듈
            if [ "${{ matrix.module.name }}" == "elasticache" ]; then
              echo "📦 ElastiCache Redis 리소스 Import 중..."
              if aws elasticache describe-cache-clusters --cache-cluster-id setof-commerce-redis-prod --region ap-northeast-2 >/dev/null 2>&1; then
                echo "  → Importing setof-commerce-redis-prod..."
                terraform import -input=false 'module.redis.aws_elasticache_cluster.this[0]' setof-commerce-redis-prod || echo "  ⚠️  Import failed or already in state"
              fi
            fi

            # ECS Web API 모듈 - Service Discovery Only (No ALB)
            # ALB resources removed - Strangler Fig Pattern
            # This service is accessed via: web-api.connectly.local:8080
            if [ "${{ matrix.module.name }}" == "ecs-web-api" ]; then
              echo "ℹ️  ECS Web API uses Service Discovery only (no ALB to import)"
            fi

            # ECS Web API Admin 모듈
            if [ "${{ matrix.module.name }}" == "ecs-web-api-admin" ]; then
              echo "📦 ECS Web API Admin 리소스 Import 중..."

              # ALB
              ALB_ARN=$(aws elbv2 describe-load-balancers --names setof-commerce-admin-alb-prod --region ap-northeast-2 --query 'LoadBalancers[0].LoadBalancerArn' --output text 2>/dev/null || echo "")
              if [ -n "$ALB_ARN" ] && [ "$ALB_ARN" != "None" ]; then
                echo "  → Importing ALB: $ALB_ARN"
                terraform import -input=false aws_lb.web_api_admin "$ALB_ARN" || echo "  ⚠️  Import failed or already in state"
              fi

              # Target Group
              TG_ARN=$(aws elbv2 describe-target-groups --names setof-commerce-admin-tg-prod --region ap-northeast-2 --query 'TargetGroups[0].TargetGroupArn' --output text 2>/dev/null || echo "")
              if [ -n "$TG_ARN" ] && [ "$TG_ARN" != "None" ]; then
                echo "  → Importing Target Group: $TG_ARN"
                terraform import -input=false aws_lb_target_group.web_api_admin "$TG_ARN" || echo "  ⚠️  Import failed or already in state"
              fi
            fi

            # ECS Web API Legacy 모듈 (Strangler Fig Pattern)
            if [ "${{ matrix.module.name }}" == "ecs-web-api-legacy" ]; then
              echo "📦 ECS Legacy API 리소스 Import 중..."

              # ALB
              ALB_ARN=$(aws elbv2 describe-load-balancers --names setof-commerce-legacy-alb-prod --region ap-northeast-2 --query 'LoadBalancers[0].LoadBalancerArn' --output text 2>/dev/null || echo "")
              if [ -n "$ALB_ARN" ] && [ "$ALB_ARN" != "None" ]; then
                echo "  → Importing ALB: $ALB_ARN"
                terraform import -input=false aws_lb.legacy_api "$ALB_ARN" || echo "  ⚠️  Import failed or already in state"
              fi

              # Target Group
              TG_ARN=$(aws elbv2 describe-target-groups --names setof-commerce-legacy-tg-prod --region ap-northeast-2 --query 'TargetGroups[0].TargetGroupArn' --output text 2>/dev/null || echo "")
              if [ -n "$TG_ARN" ] && [ "$TG_ARN" != "None" ]; then
                echo "  → Importing Target Group: $TG_ARN"
                terraform import -input=false aws_lb_target_group.legacy_api "$TG_ARN" || echo "  ⚠️  Import failed or already in state"
              fi
            fi

            # ECS Web API Legacy Admin 모듈 (Partner Admin Server)
            if [ "${{ matrix.module.name }}" == "ecs-web-api-legacy-admin" ]; then
              echo "📦 ECS Legacy Admin API 리소스 Import 중..."

              # ALB
              ALB_ARN=$(aws elbv2 describe-load-balancers --names setof-commerce-legacy-admin-alb-prod --region ap-northeast-2 --query 'LoadBalancers[0].LoadBalancerArn' --output text 2>/dev/null || echo "")
              if [ -n "$ALB_ARN" ] && [ "$ALB_ARN" != "None" ]; then
                echo "  → Importing ALB: $ALB_ARN"
                terraform import -input=false aws_lb.legacy_admin_api "$ALB_ARN" || echo "  ⚠️  Import failed or already in state"
              fi

              # Target Group
              TG_ARN=$(aws elbv2 describe-target-groups --names setof-commerce-legacy-admin-tg-prod --region ap-northeast-2 --query 'TargetGroups[0].TargetGroupArn' --output text 2>/dev/null || echo "")
              if [ -n "$TG_ARN" ] && [ "$TG_ARN" != "None" ]; then
                echo "  → Importing Target Group: $TG_ARN"
                terraform import -input=false aws_lb_target_group.legacy_admin_api "$TG_ARN" || echo "  ⚠️  Import failed or already in state"
              fi
            fi

            # ECS Migration 모듈 (Data Migration & Batch Scheduler)
            if [ "${{ matrix.module.name }}" == "ecs-migration" ]; then
              echo "ℹ️  ECS Migration uses Service Discovery only (no ALB to import)"
            fi

            # ECS Batch 모듈 (Legacy Batch Jobs - RunTask 전용)
            if [ "${{ matrix.module.name }}" == "ecs-batch" ]; then
              echo "ℹ️  ECS Batch uses RunTask only (no ECS Service to import)"
              echo "ℹ️  EventBridge Schedules and IAM roles will be created fresh"
            fi

            echo "✅ Import 완료! Plan 재실행..."
            terraform plan -out=tfplan
          else
            echo "✅ 기존 리소스 없음 또는 State와 일치. 정상 진행."
          fi

          rm -f plan_output.txt

      - name: Terraform Apply - ${{ matrix.module.name }}
        working-directory: ${{ matrix.module.dir }}
        run: |
          echo "🚀 Applying Terraform for ${{ matrix.module.name }}..."

          # Image Tag 변수 설정 (Build & Deploy 워크플로우에서 전달됨)
          EXTRA_VARS=""

          if [ "${{ matrix.module.name }}" == "ecs-web-api" ] && [ -n "${{ inputs.web-api-image-tag }}" ]; then
            echo "📦 Using Web API image tag: ${{ inputs.web-api-image-tag }}"
            EXTRA_VARS="-var=image_tag=${{ inputs.web-api-image-tag }}"
          elif [ "${{ matrix.module.name }}" == "ecs-web-api-admin" ] && [ -n "${{ inputs.web-api-admin-image-tag }}" ]; then
            echo "📦 Using Web API Admin image tag: ${{ inputs.web-api-admin-image-tag }}"
            EXTRA_VARS="-var=image_tag=${{ inputs.web-api-admin-image-tag }}"
          elif [ "${{ matrix.module.name }}" == "ecs-web-api-legacy" ] && [ -n "${{ inputs.legacy-api-image-tag }}" ]; then
            echo "📦 Using Legacy API image tag: ${{ inputs.legacy-api-image-tag }}"
            EXTRA_VARS="-var=image_tag=${{ inputs.legacy-api-image-tag }}"
          elif [ "${{ matrix.module.name }}" == "ecs-web-api-legacy-admin" ] && [ -n "${{ inputs.legacy-api-admin-image-tag }}" ]; then
            echo "📦 Using Legacy Admin API image tag: ${{ inputs.legacy-api-admin-image-tag }}"
            EXTRA_VARS="-var=image_tag=${{ inputs.legacy-api-admin-image-tag }}"
          elif [ "${{ matrix.module.name }}" == "ecs-migration" ] && [ -n "${{ inputs.migration-image-tag }}" ]; then
            echo "📦 Using Migration image tag: ${{ inputs.migration-image-tag }}"
            EXTRA_VARS="-var=image_tag=${{ inputs.migration-image-tag }}"
          elif [ "${{ matrix.module.name }}" == "ecs-batch" ] && [ -n "${{ inputs.legacy-batch-image-tag }}" ]; then
            echo "📦 Using Legacy Batch image tag: ${{ inputs.legacy-batch-image-tag }}"
            EXTRA_VARS="-var=image_tag=${{ inputs.legacy-batch-image-tag }}"
          elif [ "${{ matrix.module.name }}" == "ecs-scheduler" ] && [ -n "${{ inputs.scheduler-image-tag }}" ]; then
            echo "📦 Using Scheduler image tag: ${{ inputs.scheduler-image-tag }}"
            EXTRA_VARS="-var=image_tag=${{ inputs.scheduler-image-tag }}"
          else
            echo "ℹ️  No image tag provided for ${{ matrix.module.name }}, using default from provider.tf"
          fi

          # Terraform Plan with optional image_tag variable
          echo "📋 Generating fresh terraform plan..."
          terraform plan $EXTRA_VARS -out=tfplan

          terraform apply -auto-approve -no-color tfplan
          echo "✅ Apply completed for ${{ matrix.module.name }}"

      - name: Terraform Output - ${{ matrix.module.name }}
        working-directory: ${{ matrix.module.dir }}
        run: |
          echo "📋 Outputs for ${{ matrix.module.name }}:"
          terraform output -json > outputs-${{ matrix.module.name }}.json
          terraform output

      - name: Upload Apply Results - ${{ matrix.module.name }}
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: apply-results-${{ matrix.module.name }}
          path: ${{ matrix.module.dir }}/outputs-${{ matrix.module.name }}.json
          retention-days: 30

  notify-completion:
    name: Notify Deployment Completion
    needs: terraform-apply
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Create Deployment Summary
        run: |
          echo "## 🎉 SetOf Commerce Infrastructure Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: ${{ needs.terraform-apply.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Environment**: Production" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed by**: @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Modules Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ECR Repository" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ECS Cluster" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ElastiCache (Redis)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ECS Web API (desired_count: 0)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ECS Web API Admin (desired_count: 0)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ECS Legacy API (Strangler Fig)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ECS Legacy Admin API (Partner Admin)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ECS Migration (Data Sync & Batch)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ECS Batch (Legacy Batch Jobs - RunTask only)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ECS Scheduler (Outbox processing)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Application URLs**:" >> $GITHUB_STEP_SUMMARY
          echo "- Web API: https://commerce.set-of.com (inactive)" >> $GITHUB_STEP_SUMMARY
          echo "- Admin API: https://admin.set-of.com (inactive)" >> $GITHUB_STEP_SUMMARY
          echo "- Legacy API: https://server.set-of.com" >> $GITHUB_STEP_SUMMARY
          echo "- Legacy Admin API: https://partner.set-of.com" >> $GITHUB_STEP_SUMMARY
          echo "- Migration: Internal service (no public endpoint)" >> $GITHUB_STEP_SUMMARY
          echo "- Batch: EventBridge scheduled (no public endpoint)" >> $GITHUB_STEP_SUMMARY
          echo "- Scheduler: Internal service (Outbox processing)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next Steps**:" >> $GITHUB_STEP_SUMMARY
          echo "1. Verify infrastructure in AWS Console" >> $GITHUB_STEP_SUMMARY
          echo "2. Check CloudWatch logs" >> $GITHUB_STEP_SUMMARY
          echo "3. Test application endpoints" >> $GITHUB_STEP_SUMMARY
