domain: mileage
description: "Mileage History API shadow traffic test cases"

# Auth configuration for this suite.
auth_config:
  strategy: login
  login_endpoint: /api/v1/user/login
  phone_number: "${SHADOW_TEST_PHONE}"
  password: "${SHADOW_TEST_PASSWORD}"

test_cases:
  # === Query (조회) - Shadow Traffic 비교 대상 ===

  # 기본 조회: 인증된 사용자의 마일리지 이력 (기본 파라미터)
  - name: "mileage_histories_default"
    path: "/api/v1/mileage/my-page/mileage-histories"
    method: GET
    auth: NORMAL_GRADE
    compare_mode: full
    ignore_fields:
      - "['data']['lastDomainId']"
    safe_for_repeat: true
    known_diff:
      fields: ["message", "error"]
      reason: "인증 에러 메시지 차이. Legacy: InsufficientAuthenticationException / New: UnauthenticatedAccessException. 동작은 동일(인증 거부)."

  # 페이지 크기 지정
  - name: "mileage_histories_size_10"
    path: "/api/v1/mileage/my-page/mileage-histories?size=10"
    method: GET
    auth: NORMAL_GRADE
    compare_mode: full
    ignore_fields:
      - "['data']['lastDomainId']"
    safe_for_repeat: true
    known_diff:
      fields: ["message", "error"]
      reason: "인증 에러 메시지 차이. Legacy: InsufficientAuthenticationException / New: UnauthenticatedAccessException. 동작은 동일(인증 거부)."

