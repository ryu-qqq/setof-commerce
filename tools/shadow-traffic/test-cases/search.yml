domain: search
description: "Search API shadow traffic test cases"

test_cases:
  # === fetchSearchResults: 키워드 검색 (/api/v1/search) ===

  # --- 기본 검색 (정렬 기준별) ---
  - name: "search_keyword_recommend"
    path: "/api/v1/search"
    method: GET
    auth: none
    body:
      searchWord: "티셔츠"
      orderType: "RECOMMEND"
      size: 20
    compare_mode: full
    ignore_fields: []

  - name: "search_keyword_recent"
    path: "/api/v1/search"
    method: GET
    auth: none
    body:
      searchWord: "티셔츠"
      orderType: "RECENT"
      size: 20
    compare_mode: full
    ignore_fields: []

  - name: "search_keyword_low_price"
    path: "/api/v1/search"
    method: GET
    auth: none
    body:
      searchWord: "티셔츠"
      orderType: "LOW_PRICE"
      size: 20
    compare_mode: full
    ignore_fields: []

  - name: "search_keyword_high_price"
    path: "/api/v1/search"
    method: GET
    auth: none
    body:
      searchWord: "티셔츠"
      orderType: "HIGH_PRICE"
      size: 20
    compare_mode: full
    ignore_fields: []

  - name: "search_keyword_high_discount"
    path: "/api/v1/search"
    method: GET
    auth: none
    body:
      searchWord: "티셔츠"
      orderType: "HIGH_DISCOUNT"
      size: 20
    compare_mode: full
    ignore_fields: []

  - name: "search_keyword_high_rating"
    path: "/api/v1/search"
    method: GET
    auth: none
    body:
      searchWord: "티셔츠"
      orderType: "HIGH_RATING"
      size: 20
    compare_mode: full
    ignore_fields: []

  - name: "search_keyword_review"
    path: "/api/v1/search"
    method: GET
    auth: none
    body:
      searchWord: "티셔츠"
      orderType: "REVIEW"
      size: 20
    compare_mode: full
    ignore_fields: []

  # --- 다양한 키워드 ---
  - name: "search_keyword_korean_short"
    path: "/api/v1/search"
    method: GET
    auth: none
    body:
      searchWord: "바지"
      orderType: "RECOMMEND"
      size: 20
    compare_mode: full
    ignore_fields: []

  - name: "search_keyword_english"
    path: "/api/v1/search"
    method: GET
    auth: none
    body:
      searchWord: "NIKE"
      orderType: "RECOMMEND"
      size: 20
    compare_mode: full
    ignore_fields: []

  # --- 필터 조합 ---
  - name: "search_with_brand_filter"
    path: "/api/v1/search"
    method: GET
    auth: none
    body:
      searchWord: "티셔츠"
      brandId: 1
      orderType: "RECOMMEND"
      size: 20
    compare_mode: full
    ignore_fields: []

  - name: "search_with_seller_filter"
    path: "/api/v1/search"
    method: GET
    auth: none
    body:
      searchWord: "티셔츠"
      sellerId: 1
      orderType: "RECOMMEND"
      size: 20
    compare_mode: full
    ignore_fields: []

  - name: "search_with_category_filter"
    path: "/api/v1/search"
    method: GET
    auth: none
    body:
      searchWord: "티셔츠"
      categoryId: 1
      orderType: "RECOMMEND"
      size: 20
    compare_mode: full
    ignore_fields: []

  - name: "search_with_price_range"
    path: "/api/v1/search"
    method: GET
    auth: none
    body:
      searchWord: "티셔츠"
      lowestPrice: 10000
      highestPrice: 50000
      orderType: "LOW_PRICE"
      size: 20
    compare_mode: full
    ignore_fields: []

  - name: "search_with_multiple_brands"
    path: "/api/v1/search"
    method: GET
    auth: none
    body:
      searchWord: "티셔츠"
      brandIds: [1, 2, 3]
      orderType: "RECOMMEND"
      size: 20
    compare_mode: full
    ignore_fields: []

  - name: "search_with_multiple_categories"
    path: "/api/v1/search"
    method: GET
    auth: none
    body:
      searchWord: "티셔츠"
      categoryIds: [1, 2]
      orderType: "RECOMMEND"
      size: 20
    compare_mode: full
    ignore_fields: []

  # --- 경계값 / 특수 케이스 ---
  - name: "search_no_keyword_default"
    path: "/api/v1/search"
    method: GET
    auth: none
    body:
      size: 20
    compare_mode: full
    ignore_fields: []

  - name: "search_small_size"
    path: "/api/v1/search"
    method: GET
    auth: none
    body:
      searchWord: "티셔츠"
      size: 5
    compare_mode: full
    ignore_fields: []

  - name: "search_empty_result"
    path: "/api/v1/search"
    method: GET
    auth: none
    body:
      searchWord: "zzz_nonexistent_keyword_999"
      orderType: "RECOMMEND"
      size: 20
    compare_mode: full
    ignore_fields: []
