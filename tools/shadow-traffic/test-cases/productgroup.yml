domain: productgroup
description: "ProductGroup API shadow traffic test cases"

test_cases:
  # === fetchProductGroup: 단건 상세 조회 (/api/v1/product/group/{productGroupId}) ===
  # Note: id=1,2,3,10은 legacy에서는 200(404body)이지만 new에서는 400.
  # 사용자 확인: 존재하지 않는 상품은 new에서 400이 맞음.
  - name: "productgroup_detail_id_1"
    path: "/api/v1/product/group/1"
    method: GET
    auth: none
    compare_mode: status_only
    ignore_fields: []
    known_diff: true

  - name: "productgroup_detail_id_2"
    path: "/api/v1/product/group/2"
    method: GET
    auth: none
    compare_mode: status_only
    ignore_fields: []
    known_diff: true

  - name: "productgroup_detail_id_3"
    path: "/api/v1/product/group/3"
    method: GET
    auth: none
    compare_mode: status_only
    ignore_fields: []
    known_diff: true

  - name: "productgroup_detail_id_10"
    path: "/api/v1/product/group/10"
    method: GET
    auth: none
    compare_mode: status_only
    ignore_fields: []
    known_diff: true

  - name: "productgroup_detail_not_found"
    path: "/api/v1/product/group/999999999"
    method: GET
    auth: none
    compare_mode: status_only
    ignore_fields: []
    known_diff: true

  - name: "productgroup_detail_id_zero"
    path: "/api/v1/product/group/0"
    method: GET
    auth: none
    compare_mode: status_only
    ignore_fields: []
    known_diff: true

  # === fetchProductGroups: 목록 조회 (/api/v1/products/group) ===
  # Note: 목록 조회는 정렬/데이터가 다를 수 있으므로 structure_only로 비교
  # ignore: number, sort (레거시 Spring Data 전용), cursorValue (커서 표현 방식 차이)
  - name: "productgroups_list_default"
    path: "/api/v1/products/group"
    method: GET
    auth: none
    compare_mode: structure_only
    ignore_fields: ["['number']", "['sort']", "['cursorValue']"]

  - name: "productgroups_list_recommend"
    path: "/api/v1/products/group"
    method: GET
    auth: none
    body:
      orderType: "RECOMMEND"
      size: 20
    compare_mode: structure_only
    ignore_fields: ["['number']", "['sort']", "['cursorValue']"]

  - name: "productgroups_list_recent"
    path: "/api/v1/products/group"
    method: GET
    auth: none
    body:
      orderType: "RECENT"
      size: 20
    compare_mode: structure_only
    ignore_fields: ["['number']", "['sort']", "['cursorValue']"]

  - name: "productgroups_list_low_price"
    path: "/api/v1/products/group"
    method: GET
    auth: none
    body:
      orderType: "LOW_PRICE"
      size: 20
    compare_mode: structure_only
    ignore_fields: ["['number']", "['sort']", "['cursorValue']"]

  - name: "productgroups_list_high_price"
    path: "/api/v1/products/group"
    method: GET
    auth: none
    body:
      orderType: "HIGH_PRICE"
      size: 20
    compare_mode: structure_only
    ignore_fields: ["['number']", "['sort']", "['cursorValue']"]

  - name: "productgroups_list_high_discount"
    path: "/api/v1/products/group"
    method: GET
    auth: none
    body:
      orderType: "HIGH_DISCOUNT"
      size: 20
    compare_mode: structure_only
    ignore_fields: ["['number']", "['sort']", "['cursorValue']"]

  - name: "productgroups_list_high_rating"
    path: "/api/v1/products/group"
    method: GET
    auth: none
    body:
      orderType: "HIGH_RATING"
      size: 20
    compare_mode: structure_only
    ignore_fields: ["['number']", "['sort']", "['cursorValue']"]

  - name: "productgroups_list_review"
    path: "/api/v1/products/group"
    method: GET
    auth: none
    body:
      orderType: "REVIEW"
      size: 20
    compare_mode: structure_only
    ignore_fields: ["['number']", "['sort']", "['cursorValue']"]

  - name: "productgroups_list_filter_brand"
    path: "/api/v1/products/group"
    method: GET
    auth: none
    body:
      brandId: 1
      orderType: "RECOMMEND"
      size: 20
    compare_mode: structure_only
    ignore_fields: ["['number']", "['sort']", "['cursorValue']"]

  - name: "productgroups_list_filter_seller"
    path: "/api/v1/products/group"
    method: GET
    auth: none
    body:
      sellerId: 1
      orderType: "RECOMMEND"
      size: 20
    compare_mode: structure_only
    ignore_fields: ["['number']", "['sort']", "['cursorValue']"]

  - name: "productgroups_list_filter_category"
    path: "/api/v1/products/group"
    method: GET
    auth: none
    body:
      categoryId: 1
      orderType: "RECOMMEND"
      size: 20
    compare_mode: structure_only
    ignore_fields: ["['number']", "['sort']", "['cursorValue']", "['lastDomainId']"]

  - name: "productgroups_list_filter_price_range"
    path: "/api/v1/products/group"
    method: GET
    auth: none
    body:
      lowestPrice: 10000
      highestPrice: 100000
      orderType: "LOW_PRICE"
      size: 20
    compare_mode: structure_only
    ignore_fields: ["['number']", "['sort']", "['cursorValue']"]

  - name: "productgroups_list_small_size"
    path: "/api/v1/products/group"
    method: GET
    auth: none
    body:
      size: 5
    compare_mode: structure_only
    ignore_fields: ["['number']", "['sort']", "['cursorValue']"]

  - name: "productgroups_list_no_result_price"
    path: "/api/v1/products/group"
    method: GET
    auth: none
    body:
      lowestPrice: 999999999
      highestPrice: 9999999999
    compare_mode: structure_only
    ignore_fields: ["['number']", "['sort']", "['cursorValue']"]

  # === fetchProductGroupLikes: 최근 본 상품 배치 조회 (/api/v1/products/group/recent) ===
  # known_diff: score(레거시 전용, 신규 0.0), directDiscountRate/Price(신규는 가격 기반 계산, 레거시는 DB 저장값 - stale 데이터 존재).
  - name: "productgroup_recent_single"
    path: "/api/v1/products/group/recent"
    method: GET
    auth: none
    body:
      productGroupIds: [1]
    compare_mode: full
    ignore_fields: ["score", "directDiscountRate", "directDiscountPrice"]

  - name: "productgroup_recent_multiple"
    path: "/api/v1/products/group/recent"
    method: GET
    auth: none
    body:
      productGroupIds: [1, 2, 3]
    compare_mode: full
    ignore_fields: ["score", "directDiscountRate", "directDiscountPrice"]

  - name: "productgroup_recent_order_preserved"
    path: "/api/v1/products/group/recent"
    method: GET
    auth: none
    body:
      productGroupIds: [3, 1, 2]
    compare_mode: full
    ignore_fields: ["score", "directDiscountRate", "directDiscountPrice"]

  - name: "productgroup_recent_not_found"
    path: "/api/v1/products/group/recent"
    method: GET
    auth: none
    body:
      productGroupIds: [999999999]
    compare_mode: full
    ignore_fields: ["score", "directDiscountRate", "directDiscountPrice"]

