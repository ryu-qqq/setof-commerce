domain: faq
description: "FAQ API shadow traffic test cases"

test_cases:
  - name: "faq_list_member_login"
    path: "/api/v1/faq"
    method: GET
    auth: none
    body:
      faqType: "MEMBER_LOGIN"
    compare_mode: full
    ignore_fields: []

  - name: "faq_list_order_payment"
    path: "/api/v1/faq"
    method: GET
    auth: none
    body:
      faqType: "ORDER_PAYMENT"
    compare_mode: full
    ignore_fields: []

  - name: "faq_list_shipping"
    path: "/api/v1/faq"
    method: GET
    auth: none
    body:
      faqType: "SHIPPING"
    compare_mode: full
    ignore_fields: []

  - name: "faq_list_exchange_return"
    path: "/api/v1/faq"
    method: GET
    auth: none
    body:
      faqType: "EXCHANGE_RETURN"
    compare_mode: full
    ignore_fields: []
