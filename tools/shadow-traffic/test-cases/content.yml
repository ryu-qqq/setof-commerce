      - "productGroupThumbnails"
      - "imageComponentLinks"
      - "displayStartDate"
      - "displayEndDate"
      - "insertDate"
      - "discountRate"

  # =============================================
  # 콘텐츠 상세 조회 - TAB 컴포넌트 포함
  # =============================================

  # content_id=96: 만료 컨텐츠 → bypass=Y
