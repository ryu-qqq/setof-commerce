domain: content
description: "Content Page API shadow traffic test cases"

test_cases:
  # =============================================
  # 전시 중인 콘텐츠 ID 목록
  # =============================================
  # known_diff: 새 스키마 마이그레이션 시점 차이로 on-display 목록 상이 가능
  - name: "content_on_display"
    path: "/api/v1/content/on-display"
    method: GET
    auth: none
    compare_mode: full
    known_diff: true
    ignore_fields: []

  # =============================================
  # 콘텐츠 메타데이터 조회 (컴포넌트 미포함)
  # =============================================
  # known_diff: 타임존 변환 차이 (UTC vs KST +9h) + componentId 매핑 차이
  - name: "content_meta_id_13"
    path: "/api/v1/content/meta/13"
    method: GET
    auth: none
    compare_mode: full
    known_diff: true
    ignore_fields:
      - "displayStartDate"
      - "displayEndDate"
      - "memo"

  - name: "content_meta_id_14"
    path: "/api/v1/content/meta/14"
    method: GET
    auth: none
    compare_mode: full
    known_diff: true
    ignore_fields:
      - "displayStartDate"
      - "displayEndDate"
      - "memo"

  - name: "content_meta_id_92"
    path: "/api/v1/content/meta/92"
    method: GET
    auth: none
    compare_mode: full
    known_diff: true
    ignore_fields:
      - "displayStartDate"
      - "displayEndDate"
      - "memo"

  - name: "content_meta_id_101"
    path: "/api/v1/content/meta/101"
    method: GET
    auth: none
    compare_mode: full
    known_diff: true
    ignore_fields:
      - "displayStartDate"
      - "displayEndDate"
      - "memo"

  - name: "content_meta_not_found"
    path: "/api/v1/content/meta/999999"
    method: GET
    auth: none
    compare_mode: full
    ignore_fields: []

  # =============================================
  # 콘텐츠 상세 조회 - 비제품 컴포넌트 (TITLE, BLANK, TEXT, IMAGE)
  # bypass=Y: 만료 컨텐츠도 조회 가능
  # =============================================
  # known_diff: 타임존 변환 차이 + componentId/viewExtensionId 매핑 차이
  - name: "content_detail_non_product_123"
    path: "/api/v1/content/123?bypass=Y"
    method: GET
    auth: none
    compare_mode: full
    known_diff: true
    ignore_fields:
      - "memo"
      - "productGroupThumbnails"
      - "favorite"
      - "displayStartDate"
      - "displayEndDate"

  # =============================================
  # 콘텐츠 상세 조회 - PRODUCT 컴포넌트 포함
  # productGroupThumbnails는 AUTO 상품 쿼리 차이로 별도 검증 예정
  # =============================================

  # content_id=13: CATEGORY 컴포넌트 포함 (전시 중)
  # known_diff: 타임존 + ID 매핑 + discountRate 미세 차이 (마이그레이션 시점)
  - name: "content_detail_product_13"
    path: "/api/v1/content/13"
    method: GET
    auth: none
    compare_mode: full
    known_diff: true
    ignore_fields:
      - "memo"
      - "favorite"
      - "productGroupThumbnails"
      - "displayStartDate"
      - "displayEndDate"
      - "insertDate"
      - "discountRate"

  # content_id=100: 만료 컨텐츠 → bypass=Y (heavy content → timeout 30s)
  # known_diff: 레거시 대비 추가 컴포넌트 노출 + imageComponentLinks 빈 항목 차이
  - name: "content_detail_product_heavy_100"
    path: "/api/v1/content/100?bypass=Y"
    method: GET
    auth: none
    compare_mode: full
    timeout: 30
    known_diff: true
    ignore_fields:
      - "memo"
      - "favorite"
      - "productGroupThumbnails"
      - "imageComponentLinks"

  # content_id=98: 만료 컨텐츠 → bypass=Y
  # known_diff: 타임존 + ID 매핑 차이
  - name: "content_detail_product_98"
    path: "/api/v1/content/98?bypass=Y"
    method: GET
    auth: none
    compare_mode: full
    known_diff: true
    ignore_fields:
      - "memo"
      - "favorite"
      - "productGroupThumbnails"
      - "displayStartDate"
      - "displayEndDate"
      - "insertDate"
      - "discountRate"

  # content_id=42: 만료 컨텐츠 → bypass=Y
