# ============================================================
# Redis Layer 스테이징 환경 설정
# ============================================================
# 활성화: spring.profiles.active=stage
# ============================================================

spring:
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}

      # SSL 설정 (AWS ElastiCache 등)
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}

      lettuce:
        pool:
          # Pool Size (스테이징: 중간)
          max-active: 16
          max-idle: 8
          min-idle: 4
          max-wait: 2000ms
          time-between-eviction-runs: 30000ms

        shutdown-timeout: 200ms

redisson:
  single-server-config:
    address: "redis://${REDIS_HOST}:${REDIS_PORT:6379}"
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:0}

    # Connection Pool (스테이징: 중간)
    connection-pool-size: 16
    connection-minimum-idle-size: 4
    idle-connection-timeout: 10000
    connect-timeout: 3000
    timeout: 3000

    # Retry Settings
    retry-attempts: 3
    retry-interval: 1500

    # SSL
    ssl-enable-endpoint-identification: ${REDIS_SSL_ENABLED:false}
