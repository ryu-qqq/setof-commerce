# ============================================================
# Persistence Layer 공통 설정
# ============================================================
# 환경별 설정은 persistence-{profile}.yml 참조
# - persistence-local.yml: 로컬 개발 환경
# - persistence-prod.yml: 운영 환경
# ============================================================

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    # ⚠️ OSIV 비활성화 (필수!)
    # - 커넥션 점유 시간 최소화
    # - Lazy Loading은 Transaction 내에서만
    open-in-view: false

    hibernate:
      # ⚠️ Flyway 비활성화 상태 - Hibernate 스키마 검증 OFF
      ddl-auto: none

    properties:
      hibernate:
        # Batch Processing
        jdbc:
          batch_size: 50
          fetch_size: 50
        order_inserts: true
        order_updates: true
        batch_versioned_data: true

        # Query Plan Cache
        query:
          plan_cache_max_size: 2048
          in_clause_parameter_padding: true

    show-sql: false

  flyway:
    # ⚠️ Flyway 비활성화 - 추후 setof 전용 DB 생성 시 재활성화
    enabled: false
