persistence:
  legacy:
    enabled: true
    seller:
      enabled: true
    category:
      enabled: true
    brand:
      enabled: true
    faq:
      enabled: false
    member:
      enabled: true
    refundaccount:
      enabled: false
    shippingaddress:
      enabled: false
    wishlist:
      enabled: false
