# ============================================================
# Persistence Legacy Layer 로컬 개발 환경 설정
# ============================================================
# 활성화: spring.profiles.active=local
#
# 레거시 DB(luxurydb) 접근을 위한 별도 DataSource 설정.
# @since 1.1.0
# ============================================================

persistence:
  legacy:
    enabled: true
    seller:
      enabled: false
    category:
      enabled: false
    brand:
      enabled: false
    faq:
      enabled: false
    member:
      enabled: true
    refundaccount:
      enabled: false
    shippingaddress:
      enabled: false
    wishlist:
      enabled: false
    banner:
      enabled: false
    navigation:
      enabled: false
    content:
      enabled: false

datasource:
  legacy:
    hikari:
      jdbc-url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${LEGACY_DB_NAME:luxurydb}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      username: ${DB_USER:root}
      password: ${DB_PASSWORD:}
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 600000
      pool-name: HikariPool-Legacy-Local
