# ============================================================
# Persistence Legacy Layer 스테이지 환경 설정
# ============================================================
# 활성화: spring.profiles.active=stage
#
# 레거시 DB(luxurydb) 접근을 위한 별도 DataSource 설정.
# 같은 RDS 인스턴스의 다른 스키마를 사용합니다.
# @since 1.1.0
# ============================================================
#
# 전환 현황 (Stage):
#   [새 DB] seller, category, brand, faq, productgroup, member,
#           refundaccount, shippingaddress, wishlist, banner,
#           navigation, content, cart
#   [새 DB - member 종속] memberauth, memberconsent, mileage
#           → member.enabled=false 시 자동 전환 (코드에서 persistence.member.enabled 참조)
#   [새 DB - 레거시 어댑터 없음] discount, discountoutbox
#           → 레거시 분기 없이 항상 새 DB 사용
#
# ============================================================

persistence:
  legacy:
    enabled: true
    # --- 독립 전환 도메인 ---
    seller:
      enabled: false
    category:
      enabled: false
    brand:
      enabled: false
    faq:
      enabled: false
    productgroup:
      enabled: false
    member:
      enabled: false
    refundaccount:
      enabled: false
    shippingaddress:
      enabled: false
    wishlist:
      enabled: false
    banner:
      enabled: false
    navigation:
      enabled: false
    content:
      enabled: false
    cart:
      enabled: false

datasource:
  legacy:
    hikari:
      jdbc-url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${LEGACY_DB_NAME:luxurydb}?useSSL=true&requireSSL=true&serverTimezone=Asia/Seoul
      username: ${DB_USERNAME}
      password: ${DB_PASSWORD}
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      pool-name: HikariPool-Legacy-Stage
      connection-init-sql: SELECT 1
      data-source-properties:
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true
        rewriteBatchedStatements: true
        cacheResultSetMetadata: true
        cacheServerConfiguration: true
