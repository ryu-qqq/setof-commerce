# ============================================================
# Persistence Legacy Layer 공통 설정
# ============================================================
# Strangler Fig 패턴: 레거시 DB(luxurydb) 스키마 접근 설정
# 기본값 비활성화 - 환경별 설정에서 활성화
#
# 별도 DataSource(datasource.legacy)를 사용하여 luxurydb 스키마에 접근합니다.
# Primary DataSource(spring.datasource)는 setof 스키마를 바라봅니다.
#
# @since 1.1.0
# ============================================================

persistence:
  legacy:
    enabled: false
    seller:
      enabled: false
    category:
      enabled: false
    brand:
      enabled: false
    faq:
      enabled: false
    productgroup:
      enabled: false
    member:
      enabled: false
    refundaccount:
      enabled: false
    shippingaddress:
      enabled: false
    wishlist:
      enabled: false

datasource:
  legacy:
    hikari:
      driver-class-name: com.mysql.cj.jdbc.Driver
