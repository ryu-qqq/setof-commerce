# ============================================================
# FileFlow Client Configuration
# ============================================================
# FileFlow SDK v1.2.0 Spring Boot Starter
# base-url, service-name, service-token, timeoutмЭА SDK AutoConfigurationмЭі м≤Шл¶ђ
